// ==================== 指令飞行（DRC）请求消息 ====================
// 与 DRC 上云 https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html 及 Topic 总览 https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/topic-definition.html 对齐；DrcModeEnter 走 services，杆量体见 DrcStickControlReq。

// DrcModeEnterReq 进入 DRC 指令飞行模式请求（Dock3 协议）。
// 包含 DRC 专用 MQTT Broker 的连接信息及 DRC 链路配置参数；经 services 下发 drc_mode_enter。
// 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
message DrcModeEnterReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // mqtt_broker DRC 专用 MQTT Broker 连接信息。
  DrcMqttBroker mqtt_broker = 2;
  // osd_frequency OSD 遥测数据上报频率，取值范围 [1, 30]，单位 Hz。
  int32 osd_frequency = 3;
  // hsi_frequency HSI（水平态势感知）数据上报频率，取值范围 [1, 30]，单位 Hz。
  int32 hsi_frequency = 4;
}

// DrcMqttBroker DRC 专用 MQTT Broker 连接信息。
message DrcMqttBroker {
  // address MQTT Broker 地址，格式 "host:port"。
  string address = 1;
  // client_id MQTT 客户端 ID。
  string client_id = 2;
  // username MQTT 连接用户名。
  string username = 3;
  // password MQTT 连接密码。
  string password = 4;
  // expire_time 连接过期时间，Unix 秒级时间戳。
  int64 expire_time = 5;
  // enable_tls 是否启用 TLS 加密连接，默认 false。
  bool enable_tls = 6;
}

// DrcStickControlReq DRC 杆量控制（method stick_control）请求，与 SendDrcStickControl 对应。
// 经 thing/.../drc/down 下发；seq 与 data 同级，data 内含 roll/pitch/throttle/yaw/gimbal_pitch。
// 文档: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html#drc-%E6%9D%86%E9%87%8F%E6%8E%A7%E5%88%B6
message DrcStickControlReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // seq 指令序号，递增；当 roll/pitch/throttle/yaw/gimbal_pitch 任一分量相对上一帧有变化时，宜从 0 重新递（见 DRC-flight control 表说明），用于保序与回执对账。
  int32 seq = 2;
  // roll 左右平移速度（m/s），俯视机头朝前时：正值为向左、负值为向右，范围约 [-17, 17]（以固件/文档为准）。
  double roll = 3;
  // pitch 前后平移速度（m/s），正值为向前、负值为向后，范围约 [-17, 17]（以固件/文档为准）。
  double pitch = 4;
  // throttle 垂直速度（m/s），正值为上升、负值为下降，范围约 [-4, 5]（以固件/文档为准）。
  double throttle = 5;
  // yaw 机体偏航角速度（°/s），正值为顺时针、负值为逆时针，范围约 [-90, 90]（以固件/文档为准）。
  double yaw = 6;
  // gimbal_pitch 云台俯仰角速度（°/s），正值为向上、负值为向下（以固件/文档为准）。
  double gimbal_pitch = 7;
}

// DrcHeartBeatReq DRC 心跳（drc/down，method heart_beat）；与 data 同级的 seq 及 data.timestamp 见 DRC 文档。
message DrcHeartBeatReq {
  string device_sn = 1;
  int32 seq = 2;
  int64 timestamp_millis = 3;
}

// TakeoffToPointReq 一键起飞到指定坐标点请求。
message TakeoffToPointReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // flight_id 飞行任务 ID，全局唯一标识。
  string flight_id = 2;
  // target_latitude 目标纬度，取值范围 [-90, 90]。
  double target_latitude = 3;
  // target_longitude 目标经度，取值范围 [-180, 180]。
  double target_longitude = 4;
  // target_height 目标高度，单位米。
  double target_height = 5;
  // security_takeoff_height 安全起飞高度，单位米。
  double security_takeoff_height = 6;
  // rth_altitude 返航高度，单位米。可选。
  double rth_altitude = 7;
  // rc_lost_action 遥控器信号丢失动作，0: 返航, 1: 悬停, 2: 降落。可选。
  int32 rc_lost_action = 8;
  // max_speed 最大飞行速度，单位 m/s。可选。
  double max_speed = 9;
  // commander_flight_height 指令飞行高度，单位米。可选。
  double commander_flight_height = 10;
}

// FlyToPointReq 飞向指定航点请求。
message FlyToPointReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // fly_to_id 飞行任务 ID，全局唯一标识。
  string fly_to_id = 2;
  // max_speed 最大飞行速度，单位 m/s。
  double max_speed = 3;
  // points 航点列表，按顺序飞行。
  repeated Waypoint points = 4;
}

// Waypoint 飞行航点坐标。
message Waypoint {
  // latitude 航点纬度，取值范围 [-90, 90]。
  double latitude = 1;
  // longitude 航点经度，取值范围 [-180, 180]。
  double longitude = 2;
  // height 航点高度，单位米。
  double height = 3;
}

