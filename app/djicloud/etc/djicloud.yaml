Name: djicloud.rpc
ListenOn: 0.0.0.0:21012
Timeout: 10000
Mode: dev
Log:
  Encoding: plain
  #  Mode: file
  Path: /opt/logs/djicloud
  Level: info
  KeepDays: 300
Dji:
  MqttConfig:
    Broker:
      - tcp://127.0.0.1:1883
    ClientID: dji-cloud-001
    Username: "mqtt"
    Password: "password"
    Qos: 0
  PendingTTL: 30s
  Reply:
    EnableEventReply: true
    EnableStatusReply: false
    EnableRequestReply: false
  Drc:
    HeartbeatInterval: 2s
    HeartbeatTimeout: 300s
DB:
  DataSource: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable&TimeZone=Asia/Shanghai
  # 最大空闲连接数，默认 10。
  MaxIdleConns: 10
  # 最大打开连接数，默认 100。
  MaxOpenConns: 100
  # 慢 SQL 阈值，默认 200ms。
  SlowThreshold: 200ms
  # GORM 日志级别，默认 error，可选 silent/error/warn/info。
  LogLevel: error
  # 是否参数化 SQL 日志，默认 false。生产环境建议开启以避免日志暴露敏感参数。
  ParameterizedQueries: false
  # 是否忽略 record not found 日志，默认 false。
  IgnoreRecordNotFoundError: false
  # 是否按字段名显式查询，默认 false。
  QueryFields: false
Telemetry:
  # OSD 上报频率高，开启后仅通过 context 关闭 OSD 写库产生的 GORM SQL trace 日志。
  DisableOsdSQLTrace: true
DangerousOps:
  EnableDroneEmergencyStop: false
# SocketPush 配置（可选，未配置则不推送）
SocketPushConf:
  Endpoints:
    - 127.0.0.1:25002
  Timeout: 10000
  NonBlock: true
NacosConfig:
  IsRegister: false
  Host: 127.0.0.1
  Port: 8848
  Username: nacos
  PassWord: nacos
  NamespaceId: public
  ServiceName: djicloud
