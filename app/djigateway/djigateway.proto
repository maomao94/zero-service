// ==================== 直播请求消息 ====================

// LiveStartPushReq 开始直播推流请求。
message LiveStartPushReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // url_type 推流协议类型，0: AGORA, 1: RTMP, 2: RTSP, 3: GB28181。
  int32 url_type = 2;
  // url 推流地址。
  string url = 3;
  // video_id 视频流 ID，格式 "SN/机型-挂载位置/镜头类型"。
  string video_id = 4;
  // video_quality 视频质量，0: 自适应, 1: 流畅, 2: 标清, 3: 高清, 4: 超清。
  int32 video_quality = 5;
}

// LiveStopPushReq 停止直播推流请求。
message LiveStopPushReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // video_id 视频流 ID，与启动时一致。
  string video_id = 2;
}

// LiveSetQualityReq 设置直播画质请求。
message LiveSetQualityReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // video_id 视频流 ID。
  string video_id = 2;
  // video_quality 视频质量，0: 自适应, 1: 流畅, 2: 标清, 3: 高清, 4: 超清。
  int32 video_quality = 3;
}

