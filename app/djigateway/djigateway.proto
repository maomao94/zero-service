syntax = "proto3";

package djigateway;
option go_package = "./djigateway";
option java_multiple_files = true;
option java_package = "com.github.djigateway.grpc";
option java_outer_classname = "DjiGatewayProto";

// DjiGateway DJI 上云网关服务。
// 将业务侧 gRPC 调用转换为 DJI Dock3 Cloud API（MQTT）指令。
// 通过 MQTT 主题对接机巢网关（gateway_sn），可并行管理多台设备。
service DjiGateway {
  // Ping 健康检查接口，用于验证服务可用性。
  rpc Ping(Req) returns (Res);

  // ==================== 属性设置（Properties） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/properties.html

  // SetProperty 设置设备属性。
  // 通过 property/set 主题向设备下发属性设置命令。
  // properties 为 JSON 格式的键值对字符串。
  rpc SetProperty(SetPropertyReq) returns (CommonRes);

  // ==================== 设备管理（Device） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/device.html
  // 当前 gRPC 网关未暴露该模块的下行标准接口；相关上行消息由 MQTT SDK hooks 处理。

  // ==================== 组织管理（Organization） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/organization.html
  // 当前 gRPC 网关未暴露该模块的下行标准接口；相关上行消息由 MQTT SDK hooks 处理。

  // ==================== 直播功能（Live） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/live.html

  // LiveStartPush 开始直播推流。
  // 对应 DJI Cloud API method: live_start_push，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc LiveStartPush(LiveStartPushReq) returns (CommonRes);

  // LiveStopPush 停止直播推流。
  // 对应 DJI Cloud API method: live_stop_push，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc LiveStopPush(LiveStopPushReq) returns (CommonRes);

  // LiveSetQuality 设置直播画质。
  // 对应 DJI Cloud API method: live_set_quality，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc LiveSetQuality(LiveSetQualityReq) returns (CommonRes);

  // LiveLensChange 切换直播镜头。
  // 对应 DJI Cloud API method: live_lens_change，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/live.html
  rpc LiveLensChange(LiveLensChangeReq) returns (CommonRes);

  // LiveCameraChange 切换直播相机。
  // 对应 DJI Cloud API method: live_camera_change，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/live.html
  rpc LiveCameraChange(LiveCameraChangeReq) returns (CommonRes);

  // ==================== 媒体功能（Media） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/media.html

  // MediaUploadFlighttaskMediaPrioritize 优先上传指定航线任务媒体。
  // 对应 DJI Cloud API method: upload_flighttask_media_prioritize，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc MediaUploadFlighttaskMediaPrioritize(MediaFlighttaskReq) returns (CommonRes);

  // MediaFastUpload 快速上传指定媒体文件。
  // 对应 DJI Cloud API method: media_fast_upload，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc MediaFastUpload(MediaFastUploadReq) returns (CommonRes);

  // MediaHighestPriorityUploadFlighttask 最高优先级上传指定航线任务媒体。
  // 对应 DJI Cloud API method: highest_priority_upload_flighttask_media，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc MediaHighestPriorityUploadFlighttask(MediaFlighttaskReq) returns (CommonRes);

  // ==================== 航线功能（Wayline） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/wayline.html

  // FlightTaskPrepare 航线任务准备。
  // 对应 DJI Cloud API method: flighttask_prepare，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc FlightTaskPrepare(FlightTaskPrepareReq) returns (CommonRes);

  // FlightTaskExecute 航线任务执行。
  // 对应 DJI Cloud API method: flighttask_execute，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // flight_id 须与同一次航线任务准备（FlightTaskPrepare）中的 flight_id 一致。
  rpc FlightTaskExecute(FlightTaskExecuteReq) returns (CommonRes);

  // CancelFlightTask 取消航线任务。
  // 对应 DJI Cloud API method: flighttask_undo，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc CancelFlightTask(CancelFlightTaskReq) returns (CommonRes);

  // PauseFlightTask 暂停航线任务。
  // 对应 DJI Cloud API method: flighttask_pause，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc PauseFlightTask(DeviceSnReq) returns (CommonRes);

  // ResumeFlightTask 恢复已暂停的航线任务。
  // 对应 DJI Cloud API method: flighttask_recovery，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc ResumeFlightTask(DeviceSnReq) returns (CommonRes);

  // StopFlightTask 强制停止当前航线任务。
  // 对应 DJI Cloud API method: flighttask_stop，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/wayline.html
  rpc StopFlightTask(DeviceSnReq) returns (CommonRes);

  // ReturnHome 控制飞行器一键返航。
  // 对应 DJI Cloud API method: return_home，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc ReturnHome(DeviceSnReq) returns (CommonRes);

  // ReturnHomeCancelAutoReturn 取消自动返航。
  // 对应 DJI Cloud API method: return_home_cancel，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc ReturnHomeCancelAutoReturn(DeviceSnReq) returns (CommonRes);

  // ReturnSpecificHome 返航至指定备降点。
  // 对应 DJI Cloud API method: return_specific_home，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/cmd.html
  rpc ReturnSpecificHome(ReturnSpecificHomeReq) returns (CommonRes);

  // ==================== HMS 管理（HMS） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/hms.html
  // 当前 gRPC 网关未暴露该模块的下行标准接口；相关上行消息由 MQTT SDK hooks 处理。

  // ==================== 远程调试（Cmd） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/cmd.html

  // DebugModeOpen 开启机巢调试模式。
  // 对应 DJI Cloud API method: debug_mode_open，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc DebugModeOpen(DeviceSnReq) returns (CommonRes);

  // DebugModeClose 关闭机巢调试模式。
  // 对应 DJI Cloud API method: debug_mode_close，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc DebugModeClose(DeviceSnReq) returns (CommonRes);

  // CoverOpen 打开机巢舱盖。
  // 对应 DJI Cloud API method: cover_open，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc CoverOpen(DeviceSnReq) returns (CommonRes);

  // CoverClose 关闭机巢舱盖。
  // 对应 DJI Cloud API method: cover_close，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc CoverClose(DeviceSnReq) returns (CommonRes);

  // CoverForceClose 强制关闭机巢舱盖。
  // 对应 DJI Cloud API method: cover_force_close，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc CoverForceClose(DeviceSnReq) returns (CommonRes);

  // DroneOpen 开启机巢中的无人机电源。
  // 对应 DJI Cloud API method: drone_open，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc DroneOpen(DeviceSnReq) returns (CommonRes);

  // DroneClose 关闭机巢中的无人机电源。
  // 对应 DJI Cloud API method: drone_close，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc DroneClose(DeviceSnReq) returns (CommonRes);

  // DeviceReboot 重启机巢设备。
  // 对应 DJI Cloud API method: device_reboot，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc DeviceReboot(DeviceSnReq) returns (CommonRes);

  // ChargeOpen 开启机巢充电功能。
  // 对应 DJI Cloud API method: charge_open，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc ChargeOpen(DeviceSnReq) returns (CommonRes);

  // ChargeClose 关闭机巢充电功能。
  // 对应 DJI Cloud API method: charge_close，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc ChargeClose(DeviceSnReq) returns (CommonRes);

  // DroneFormat 格式化无人机存储。
  // 对应 DJI Cloud API method: drone_format，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc DroneFormat(DeviceSnReq) returns (CommonRes);

  // DeviceFormat 格式化机巢设备存储。
  // 对应 DJI Cloud API method: device_format，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc DeviceFormat(DeviceSnReq) returns (CommonRes);

  // SupplementLightOpen 开启机巢补光灯。
  // 对应 DJI Cloud API method: supplement_light_open，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc SupplementLightOpen(DeviceSnReq) returns (CommonRes);

  // SupplementLightClose 关闭机巢补光灯。
  // 对应 DJI Cloud API method: supplement_light_close，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc SupplementLightClose(DeviceSnReq) returns (CommonRes);

  // BatteryStoreModeSwitch 切换电池保养存储模式。
  // 对应 DJI Cloud API method: battery_store_mode_switch，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc BatteryStoreModeSwitch(BatteryStoreModeReq) returns (CommonRes);

  // AlarmStateSwitch 切换机巢声光报警状态。
  // 对应 DJI Cloud API method: alarm_state_switch，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc AlarmStateSwitch(AlarmStateSwitchReq) returns (CommonRes);

  // AirConditionerModeSwitch 切换机巢空调工作模式。
  // 对应 DJI Cloud API method: air_conditioner_mode_switch，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc AirConditionerModeSwitch(AirConditionerModeSwitchReq) returns (CommonRes);

  // BatteryMaintenanceSwitch 切换电池保养功能开关。
  // 对应 DJI Cloud API method: battery_maintenance_switch，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/cmd.html
  rpc BatteryMaintenanceSwitch(BatteryStoreModeReq) returns (CommonRes);

  // ==================== 固件升级（Firmware） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/firmware.html

  // OtaCreate 创建固件升级任务。
  // 对应 DJI Cloud API method: ota_create，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc OtaCreate(OtaCreateReq) returns (CommonRes);

  // ==================== 远程日志（Log） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/log.html

  // Topic: thing/product/{gateway_sn}/services | events。
  // fileupload_* 控制接口方向 down（云平台→设备），fileupload_progress/result 为设备上行事件。

  // RemoteLogFileList 查询可上传的远程日志文件列表。
  // 对应 DJI Cloud API method: fileupload_list，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc RemoteLogFileList(RemoteLogFileListReq) returns (CommonRes);

  // RemoteLogFileUploadStart 开始上传远程日志文件。
  // 对应 DJI Cloud API method: fileupload_start，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc RemoteLogFileUploadStart(RemoteLogFileUploadReq) returns (CommonRes);

  // RemoteLogFileUploadUpdate 更新远程日志文件上传任务。
  // 对应 DJI Cloud API method: fileupload_update，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc RemoteLogFileUploadUpdate(RemoteLogFileUploadReq) returns (CommonRes);

  // RemoteLogFileUploadCancel 取消远程日志文件上传任务。
  // 对应 DJI Cloud API method: fileupload_cancel，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc RemoteLogFileUploadCancel(RemoteLogFileUploadReq) returns (CommonRes);

  // ==================== 配置更新（Config） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/config.html

  // ConfigUpdate 下发设备配置更新。
  // 对应 DJI Cloud API method: config_update，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc ConfigUpdate(ConfigUpdateReq) returns (CommonRes);

  // ==================== 指令飞行（DRC） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html

  // FlightAuthorityGrab 获取飞行控制权。
  // 对应 DJI Cloud API method: flight_authority_grab，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // 在进行指令飞行操控前需要先获取飞行控制权。
  rpc FlightAuthorityGrab(DeviceSnReq) returns (CommonRes);

  // PayloadAuthorityGrab 获取负载控制权。
  // 对应 DJI Cloud API method: payload_authority_grab，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // 在控制相机、云台等负载设备前需要先获取负载控制权。
  rpc PayloadAuthorityGrab(DeviceSnReq) returns (CommonRes);

  // DrcModeEnter 进入指令飞行（DRC）模式。
  // 对应 DJI Cloud API method: drc_mode_enter，
  // Topic: thing/product/{gateway_sn}/services，设备应答 services_reply，非 drc/* 子路径。
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // 进入 DRC 模式后，可在 drc/down 上发杆量（见 SendDrcStickControl 与 DRC 杆量: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html#drc-%E6%9D%86%E9%87%8F%E6%8E%A7%E5%88%B6 ）。
  rpc DrcModeEnter(DrcModeEnterReq) returns (CommonRes);

  // DrcModeExit 退出指令飞行（DRC）模式。
  // 对应 DJI Cloud API method: drc_mode_exit，
  // Topic: thing/product/{gateway_sn}/services，设备应答 services_reply。
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc DrcModeExit(DeviceSnReq) returns (CommonRes);

  // SendDrcStickControl 经 drc/down 发 DRC 杆量控制（method stick_control）。
  // Topic: thing/product/{gateway_sn}/drc/down。建议发送频率约 **5～10 Hz**；与 SendDrcHeartBeat、DroneEmergencyStop 同为即发即忘，无 services_reply。
  rpc SendDrcStickControl(DrcStickControlReq) returns (CommonRes);

  // SendDrcHeartBeat 经 drc/down 发 DRC 心跳（method heart_beat；seq 与 data.timestamp 见 DRC 文档）。
  rpc SendDrcHeartBeat(DrcHeartBeatReq) returns (CommonRes);

  // DroneEmergencyStop 通过 DRC 通道下发飞行器紧急停桨。
  // 对应 DJI Cloud API method: drone_emergency_stop（drc/down），仅表示已发布到 MQTT，不等待 services_reply。
  // 需要在配置文件中开启 DangerousOps.EnableDroneEmergencyStop 才能调用。
  rpc DroneEmergencyStop(DeviceSnReq) returns (CommonRes);

  // FlyToPoint 飞向指定航点。
  // 对应 DJI Cloud API method: fly_to_point，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // 适用于飞行器在空中的场景，支持多航点路径。
  rpc FlyToPoint(FlyToPointReq) returns (CommonRes);

  // FlyToPointStop 停止当前的飞向航点任务。
  // 对应 DJI Cloud API method: fly_to_point_stop，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc FlyToPointStop(DeviceSnReq) returns (CommonRes);

  // TakeoffToPoint 一键起飞到指定坐标点。
  // 对应 DJI Cloud API method: takeoff_to_point，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // 适用于飞行器在机场内的场景。
  rpc TakeoffToPoint(TakeoffToPointReq) returns (CommonRes);

  // CameraModeSwitch 切换相机拍摄模式。
  // 对应 DJI Cloud API method: camera_mode_switch，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc CameraModeSwitch(CameraModeSwitchReq) returns (CommonRes);

  // CameraPhotoTake 控制相机拍照。
  // 对应 DJI Cloud API method: camera_photo_take，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc CameraPhotoTake(CameraPhotoTakeReq) returns (CommonRes);

  // CameraPhotoStop 停止连续拍照。
  // 对应 DJI Cloud API method: camera_photo_stop，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
  rpc CameraPhotoStop(CameraPhotoStopReq) returns (CommonRes);

  // CameraRecordingStart 开始录像。
  // 对应 DJI Cloud API method: camera_recording_start，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc CameraRecordingStart(CameraRecordingStartReq) returns (CommonRes);

  // CameraRecordingStop 停止录像。
  // 对应 DJI Cloud API method: camera_recording_stop，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc CameraRecordingStop(CameraRecordingStopReq) returns (CommonRes);

  // CameraFocalLengthSet 设置相机焦距（变焦倍数）。
  // 对应 DJI Cloud API method: camera_focal_length_set，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc CameraFocalLengthSet(CameraFocalLengthSetReq) returns (CommonRes);

  // GimbalReset 重置云台角度。
  // 对应 DJI Cloud API method: gimbal_reset，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc GimbalReset(GimbalResetReq) returns (CommonRes);

  // CameraAim 相机指点对准。
  // 对应 DJI Cloud API method: camera_aim，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
  rpc CameraAim(CameraAimReq) returns (CommonRes);

  // CameraPointFocusAction 相机指点对焦。
  // 对应 DJI Cloud API method: camera_point_focus_action，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
  rpc CameraPointFocusAction(CameraPointFocusActionReq) returns (CommonRes);

  // CameraScreenSplit 相机分屏控制。
  // 对应 DJI Cloud API method: camera_screen_split，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
  rpc CameraScreenSplit(CameraScreenSplitReq) returns (CommonRes);

  // CameraPhotoStorageSet 设置拍照存储位置。
  // 对应 DJI Cloud API method: camera_photo_storage_set，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
  rpc CameraPhotoStorageSet(CameraPhotoStorageSetReq) returns (CommonRes);

  // CameraVideoStorageSet 设置录像存储位置。
  // 对应 DJI Cloud API method: camera_video_storage_set，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
  rpc CameraVideoStorageSet(CameraVideoStorageSetReq) returns (CommonRes);

  // CameraLookAt 相机朝向指定坐标。
  // 对应 DJI Cloud API method: camera_look_at，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
  rpc CameraLookAt(CameraLookAtReq) returns (CommonRes);

  // CameraScreenDrag 相机屏幕拖拽控制。
  // 对应 DJI Cloud API method: camera_screen_drag，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
  rpc CameraScreenDrag(CameraScreenDragReq) returns (CommonRes);

  // CameraIrMeteringPoint 红外测温点设置。
  // 对应 DJI Cloud API method: camera_ir_metering_point，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
  rpc CameraIrMeteringPoint(CameraIrMeteringPointReq) returns (CommonRes);

  // CameraIrMeteringArea 红外区域测温设置。
  // 对应 DJI Cloud API method: camera_ir_metering_area，
  // 方向 down（云平台→设备），等待设备 ACK 后返回结果。
  // https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/drc.html
  rpc CameraIrMeteringArea(CameraIrMeteringAreaReq) returns (CommonRes);

  // ==================== 自定义飞行区（Custom Fly Region） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/custom-fly-region.html
  // 当前 gRPC 网关未暴露该模块的下行标准接口；相关上行消息由 MQTT SDK hooks 处理。

  // ==================== PSDK 功能（PSDK） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/psdk.html
  // 当前 gRPC 网关未暴露该模块的下行标准接口；相关 PSDK 上行事件由 MQTT SDK hooks 处理。

  // PsdkUIResourceUpload PSDK UI 资源上传。
  // 对应 DJI Cloud API method: psdk_ui_resource_upload，
  // Topic: thing/product/{gateway_sn}/services，方向 down（云平台→设备），等待设备 ACK 后返回结果。
  rpc PsdkUIResourceUpload(PsdkUIResourceUploadReq) returns (CommonRes);

  // ==================== PSDK 互联互通（PSDK Transmit） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/psdk-transmit-custom-data.html

  // SendCustomDataToPsdk 自定义数据透传至 PSDK 负载设备。
  // 对应 DJI Cloud API method: custom_data_transmission_to_psdk，
  // Topic: thing/product/{gateway_sn}/services，方向 down（云平台→设备），
  // 将自定义消息透传推送到 PSDK 负载设备，等待设备 ACK 后返回结果。
  // 上行方向（设备→云平台）通过 events topic 的 custom_data_transmission_from_psdk 事件钩子处理。
  rpc SendCustomDataToPsdk(CustomDataToPsdkReq) returns (CommonRes);

  // ==================== ESDK 互联互通（ESDK Transmit） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/esdk-transmit-custom-data.html
  // 当前 gRPC 网关未暴露该模块的下行标准接口；相关上行消息由 MQTT SDK hooks 处理。

  // ==================== 远程解禁（Flysafe） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/flysafe.html
  // 当前 gRPC 网关未暴露该模块的下行标准接口；相关上行消息由 MQTT SDK hooks 处理。

  // ==================== AirSense ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/airsense.html
  // 当前 gRPC 网关未暴露该模块的下行标准接口；相关上行消息由 MQTT SDK hooks 处理。

  // ==================== 远程控制（Remote Control） ====================
  // 参考: https://developer.dji.com/doc/cloud-api-tutorial/cn/api-reference/dock-to-cloud/mqtt/dock/dock3/remote-control.html
  // 当前 gRPC 网关未暴露该模块的下行标准接口；相关上行消息由 MQTT SDK hooks 处理。

  // ==================== 平台能力接口（非 DJI 标准 API，本服务自定义） ====================

  // 平台能力 = 大疆 Cloud API 中没有的、由本服务结合业务需求自定义或组合的接口。
  // 大疆标准协议转发类接口请按大疆文档分类归入上方对应分区。

  // IsDeviceOnline 查询机巢在线状态。
  // 数据来源：收到 sys/product/+/status 或 OSD 心跳时写入 onlineCache；离线由 TTL 超时推断。
  // 本接口从 onlineCache 读取，无需 MQTT 通信。
  rpc IsDeviceOnline(DeviceSnReq) returns (DeviceOnlineRes);

  // GetFlightTaskProgressLast 查询本服务内存中最近一次 flighttask_progress 上报。
  // 数据来源：thing/product/{gateway_sn}/events、method=flighttask_progress（设备上行），
  // 由 SDK 分发至钩子后写入进程内缓存；非大疆标准查询接口。
  rpc GetFlightTaskProgressLast(DeviceSnReq) returns (FlightTaskProgressLastRes);
}

// ==================== 通用消息 ====================

// Req 健康检查请求。
message Req {
  // ping 请求标识，任意字符串。
  string ping = 1;
}

// Res 健康检查响应。
message Res {
  // pong 响应标识，回传请求中的 ping 内容。
  string pong = 1;
}

// CommonRes 通用响应，用于返回命令执行结果。
message CommonRes {
  // code 结果码，0 表示成功，-1 表示失败。
  int32 code = 1;
  // message 结果描述信息，成功时为 "success"，失败时为错误详情（含中文描述）。
  string message = 2;
  // tid 事务 ID（DJI Cloud API 中的 tid），用于追踪本次请求在 MQTT 链路中的唯一标识。
  string tid = 3;
  // reason_code DJI 设备原始错误码（对应 DJIErrorCode 枚举值），仅在设备返回错误时有值，成功时为 0。
  int32 reason_code = 4;
}

// DeviceSnReq 通用设备请求，仅包含设备序列号。
// 用于无额外参数的 RPC 请求（如 FlightAuthorityGrab、DrcModeExit 等）。
message DeviceSnReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
}

// ==================== 属性设置（Properties）请求消息 ====================

// SetPropertyReq 设备属性设置请求。
message SetPropertyReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // properties JSON 格式的属性键值对字符串。
  string properties = 2;
}

// ==================== 设备管理（Device）消息 ====================
// 当前 proto 未定义设备管理下行请求；设备状态、拓扑等上行由 MQTT SDK 结构承载。

// ==================== 组织管理（Organization）消息 ====================
// 当前 proto 未定义组织管理下行请求；requests 上行由 MQTT SDK 结构承载。

// ==================== 直播功能（Live）请求消息 ====================

// LiveStartPushReq 开始直播推流请求。
message LiveStartPushReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // url_type 推流协议类型，0: AGORA, 1: RTMP, 2: RTSP, 3: GB28181。
  int32 url_type = 2;
  // url 推流地址。
  string url = 3;
  // video_id 视频流 ID，格式 "SN/机型-挂载位置/镜头类型"。
  string video_id = 4;
  // video_quality 视频质量，0: 自适应, 1: 流畅, 2: 标清, 3: 高清, 4: 超清。
  int32 video_quality = 5;
}

// LiveStopPushReq 停止直播推流请求。
message LiveStopPushReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // video_id 视频流 ID，与启动时一致。
  string video_id = 2;
}

// LiveSetQualityReq 设置直播画质请求。
message LiveSetQualityReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // video_id 视频流 ID。
  string video_id = 2;
  // video_quality 视频质量，0: 自适应, 1: 流畅, 2: 标清, 3: 高清, 4: 超清。
  int32 video_quality = 3;
}

// LiveLensChangeReq 切换直播镜头请求。
// 对应 DJI Cloud API method: live_lens_change（Services, down）。
message LiveLensChangeReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // video_id 视频流 ID。
  string video_id = 2;
  // video_type 镜头类型，0: 广角, 1: 变焦, 2: 红外。
  int32 video_type = 3;
}

// LiveCameraChangeReq 切换直播相机请求。
// 对应 DJI Cloud API method: live_camera_change（Services, down）。
message LiveCameraChangeReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // video_id 视频流 ID。
  string video_id = 2;
  // camera_index 目标相机索引，格式 type-subtype-gimbalIndex（与 data.camera_index 一致）。
  string camera_index = 3;
}

// ==================== 媒体功能（Media）请求消息 ====================

// MediaFlighttaskReq 航线任务媒体上传请求。
message MediaFlighttaskReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // flight_id 航线任务 ID，对应 data.flight_id。
  string flight_id = 2;
}

// MediaFastUploadReq 媒体文件快速上传请求。
message MediaFastUploadReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // file_id 媒体文件 ID，对应 data.file_id。
  string file_id = 2;
}

// ==================== 航线功能（Wayline）请求消息 ====================

// FlightTaskFileRef 航线文件信息。
// 对应 flighttask_prepare.data.file。
message FlightTaskFileRef {
  // url 航线文件（WPML）下载地址。必填。
  string url = 1;
  // fingerprint 文件指纹（如 MD5），用于校验。可选。
  string fingerprint = 2;
}

// FlightTaskPrepareSimulateMission 模拟任务配置。
// 对应 flighttask_prepare.data.simulate_mission。
message FlightTaskPrepareSimulateMission {
  // is_enable 是否启用模拟任务。
  bool is_enable = 1;
  // latitude 模拟起点纬度，启用时必填。
  double latitude = 2;
  // longitude 模拟起点经度，启用时必填。
  double longitude = 3;
}

// FlightTaskPrepareBreakPoint 断点续飞信息。
// 对应 flighttask_prepare.data.break_point。
message FlightTaskPrepareBreakPoint {
  // index 断点序号（航点索引，从 0 开始）。
  int32 index = 1;
  // state 断点状态，0: 在航段上, 1: 在航点上。
  int32 state = 2;
  // progress 断点进度 [0, 1]。
  double progress = 3;
  // wayline_id 断点所在航线 ID。
  int32 wayline_id = 4;
}

// FlightTaskPrepareReq 航线任务准备请求。
// 对应 DJI Cloud API method: flighttask_prepare（Services, down）。
message FlightTaskPrepareReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // flight_id 航线任务 ID，全局唯一。必填。
  string flight_id = 2;
  // task_type 任务类型，0: 立即执行, 1: 定时执行, 2: 条件触发。必填。
  int32 task_type = 3;
  // execute_time 计划执行时间，Unix 毫秒时间戳；0 表示立即执行。
  int64 execute_time = 4;
  // wayline_type 航线类型，0: 普通航线, 1: 协调航线。
  int32 wayline_type = 5;
  // file 航线文件信息。必填。
  FlightTaskFileRef file = 6;
  // break_point 断点续飞信息；无需续飞时可省略。
  FlightTaskPrepareBreakPoint break_point = 7;
  // rth_altitude 返航高度（米），取值范围 [20, 500]。
  int32 rth_altitude = 8;
  // out_of_control_action 失控动作，0: 返航, 1: 悬停, 2: 降落。
  int32 out_of_control_action = 9;
  // exit_wayline_when_rc_lost 遥控器失联是否退出航线，0: 不退出, 1: 退出。
  int32 exit_wayline_when_rc_lost = 10;
  // simulate_mission 仿真调试；未启用时可省略或 is_enable=false。
  FlightTaskPrepareSimulateMission simulate_mission = 11;
}

// FlightTaskExecuteReq 航线任务执行请求。
// 对应 DJI Cloud API method: flighttask_execute（Services, down）。
message FlightTaskExecuteReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // flight_id 航线任务 ID，须与航线任务准备请求中的 flight_id 一致。
  string flight_id = 2;
}

// CancelFlightTaskReq 取消航线任务请求。
// 对应 DJI Cloud API method: flighttask_undo（Services, down）。
message CancelFlightTaskReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // flight_ids 待取消的航线任务 ID 列表。
  repeated string flight_ids = 2;
}

// ReturnSpecificHomeReq 返航至指定备降点请求。
// 对应 DJI Cloud API method: return_specific_home（Services, down）。
message ReturnSpecificHomeReq {
  // device_sn 目标机巢设备序列号（gateway_sn）。
  string device_sn = 1;
  // latitude 指定返航点纬度，取值范围 [-90, 90]。
  double latitude = 2;
  // longitude 指定返航点经度，取值范围 [-180, 180]。
  double longitude = 3;
  // height 指定返航点高度，单位米。
  double height = 4;
}

// ==================== HMS 管理（HMS）消息 ====================
// HMS 为 events 上行通知，当前 gRPC proto 未定义下行请求。

// ==================== 远程调试（Cmd）请求消息 ====================

