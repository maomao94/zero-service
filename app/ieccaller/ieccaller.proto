syntax = "proto3";

package ieccaller;
option go_package = "./ieccaller";
option java_multiple_files = true;
option java_package = "com.github.iec.caller.grpc";
option java_outer_classname = "IecCallerProto";

service IecCaller {
  rpc Ping (Req) returns (Res);
  // 发送带时标的测试命令
  rpc SendTestCmd (SendTestCmdReq) returns (SendTestCmdRes);
  // 发起读命令
  rpc SendReadCmd (SendReadCmdReq) returns (SendReadCmdRes);
  // 发送总召唤
  rpc SendInterrogationCmd (SendInterrogationCmdReq) returns (SendInterrogationCmdRes);
  // 累积量召唤
  rpc SendCounterInterrogationCmd(SendCounterInterrogationCmdReq) returns (SendCounterInterrogationCmdRes);
  // 发送命令（通用，需指定typeId）注意 无 104 ack 响应
  rpc SendCommand(SendCommandReq) returns (SendCommandRes);
  // 单点命令 (C_SC_NA_1=45 不带时标 / C_SC_TA_1=58 带CP56Time2a时标，由withTime字段控制)
  rpc SendSingleCommand(SendSingleCommandReq) returns (SendSingleCommandRes);
  // 双点命令 (C_DC_NA_1=46 不带时标 / C_DC_TA_1=59 带CP56Time2a时标，由withTime字段控制)
  rpc SendDoubleCommand(SendDoubleCommandReq) returns (SendDoubleCommandRes);
  // 档位调节命令 (C_RC_NA_1=47 不带时标 / C_RC_TA_1=60 带CP56Time2a时标，由withTime字段控制)
  rpc SendStepCommand(SendStepCommandReq) returns (SendStepCommandRes);
  // 设点命令-归一化值 (C_SE_NA_1=48 不带时标 / C_SE_TA_1=61 带CP56Time2a时标，由withTime字段控制)
  rpc SendSetpointNormalized(SendSetpointNormalizedReq) returns (SendSetpointNormalizedRes);
  // 设点命令-标度化值 (C_SE_NB_1=49 不带时标 / C_SE_TB_1=62 带CP56Time2a时标，由withTime字段控制)
  rpc SendSetpointScaled(SendSetpointScaledReq) returns (SendSetpointScaledRes);
  // 设点命令-短浮点数 (C_SE_NC_1=50 不带时标 / C_SE_TC_1=63 带CP56Time2a时标，由withTime字段控制)
  rpc SendSetpointFloat(SendSetpointFloatReq) returns (SendSetpointFloatRes);
  // 32位位串命令 (C_BO_NA_1=51 不带时标 / C_BO_TA_1=64 带CP56Time2a时标，由withTime字段控制)
  rpc SendBitstringCommand(SendBitstringCommandReq) returns (SendBitstringCommandRes);

  // 根据ID查询点位绑定信息
  rpc QueryPointMappingById(QueryPointMappingByIdReq) returns (QueryPointMappingByIdRes);
  // 根据tagStation、coa、ioa查询点位绑定信息
  rpc QueryPointMappingByKey(QueryPointMappingByKeyReq) returns (QueryPointMappingByKeyRes);
  // 分页查询点位绑定列表
  rpc PageListPointMapping(PageListPointMappingReq) returns (PageListPointMappingRes);
  // 清除点位绑定缓存（支持批量）
  rpc ClearPointMappingCache(ClearPointMappingCacheReq) returns (ClearPointMappingCacheRes);
}

message Req {
  string ping = 1;
}

message Res {
  string pong = 1;
}

message SendTestCmdReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
}

message SendTestCmdRes {
}

message SendReadCmdReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
}

message SendReadCmdRes {
}

message SendInterrogationCmdReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
}

message SendInterrogationCmdRes {
}

message SendCounterInterrogationCmdReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
}

message SendCounterInterrogationCmdRes {
}

message SendCommandReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 typeId = 4; // 指令类型，例如 45=C_SC_NA_1, 46=C_DC_NA_1 ...
  uint32 ioa = 5;
  string value = 6; // 通用值，例如 "1","true","12.3"
}

message SendCommandRes {
}

message SendSingleCommandRes {
  bool value = 1; // 从站回显的单点命令值（true=合, false=分）
}

message SendDoubleCommandRes {
  DoubleCommandValue value = 1; // 从站回显的双点命令值（DCO_ON=合, DCO_OFF=分）
}

message SendStepCommandRes {
  int32 value = 1; // 从站回显的档位调节命令值（1=降一步, 2=升一步）
}

message SendSetpointNormalizedRes {
  int32 value = 1; // 从站回显的归一化设点值（-32768～32767，对应-1.0～1.0）
}

message SendSetpointScaledRes {
  int32 value = 1; // 从站回显的标度化设点值（与请求相同的原始标度值）
}

message SendSetpointFloatRes {
  double value = 1; // 从站回显的短浮点设点值（IEEE 754 单精度浮点）
}

message SendBitstringCommandRes {
  uint64 value = 1; // 从站回显的32位位串命令值（低32位有效）
}

message SendSingleCommandReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  bool value = 5;  // true=合, false=分
  bool withTime = 6; // true=带CP56Time2a时标(C_SC_TA_1=58), false=不带(C_SC_NA_1=45)
}

message SendDoubleCommandReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  DoubleCommandValue value = 5;  // DCO_ON=合, DCO_OFF=分
  bool withTime = 6; // true=带CP56Time2a时标(C_DC_TA_1=59), false=不带(C_DC_NA_1=46)
}

enum DoubleCommandValue {
  DCO_NOT_ALLOWED = 0;
  DCO_ON = 1;
  DCO_OFF = 2;
}

message SendStepCommandReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  StepCommandValue value = 5;  // SCO_DOWN=降一步, SCO_UP=升一步
  bool withTime = 6; // true=带CP56Time2a时标(C_RC_TA_1=60), false=不带(C_RC_NA_1=47)
}

enum StepCommandValue {
  SCO_NOT_ALLOWED = 0;
  SCO_DOWN = 1;
  SCO_UP = 2;
}

message SendSetpointNormalizedReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  int32 value = 5;
  bool withTime = 6; // true=带CP56Time2a时标(C_SE_TA_1=61), false=不带(C_SE_NA_1=48)
}

message SendSetpointScaledReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  int32 value = 5;
  bool withTime = 6; // true=带CP56Time2a时标(C_SE_TB_1=62), false=不带(C_SE_NB_1=49)
}

message SendSetpointFloatReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  double value = 5;
  bool withTime = 6; // true=带CP56Time2a时标(C_SE_TC_1=63), false=不带(C_SE_NC_1=50)
}

message SendBitstringCommandReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  uint64 value = 5;
  bool withTime = 6; // true=带CP56Time2a时标(C_BO_TA_1=64), false=不带(C_BO_NA_1=51)
}

message PbDevicePointMapping {
  int64 id = 1;
  string createTime = 2;
  string updateTime = 3;
  string tagStation = 4;
  int64 coa = 5;
  int64 ioa = 6;
  string deviceId = 7;
  string deviceName = 8;
  string tdTableType = 9;
  int32 enablePush = 10; // 0: 禁用推送, 1: 启用推送
  string description = 11; // 点位描述信息
  string ext1 = 12;
  string ext2 = 13;
  string ext3 = 14;
  string ext4 = 15;
  string ext5 = 16;
}

message QueryPointMappingByIdReq {
  int64 id = 1;
}

message QueryPointMappingByIdRes {
  PbDevicePointMapping mapping = 1;
}

message QueryPointMappingByKeyReq {
  string tagStation = 1;
  int64 coa = 2;
  int64 ioa = 3;
}

message QueryPointMappingByKeyRes {
  PbDevicePointMapping mapping = 1;
}

message PageListPointMappingReq {
  int64 page = 1; // 页码
  int64 pageSize = 2; // 每页大小
  string tagStation = 3;
  int64 coa = 4;
  string deviceId = 5;
}

message PageListPointMappingRes {
  int64 total = 1;
  repeated PbDevicePointMapping mappings = 2;
}

message ClearPointMappingCacheReq {
  repeated string keys = 1; // 缓存key列表
  repeated CacheKeyInfo keyInfos = 2; // 缓存key信息列表，用于根据tagStation、coa、ioa生成key
}

message CacheKeyInfo {
  string tagStation = 1;
  int64 coa = 2;
  int64 ioa = 3;
}

message ClearPointMappingCacheRes {
  int64 clearedCount = 1; // 清除的缓存数量
}