syntax = "proto3";

package ieccaller;
option go_package = "./ieccaller";
option java_multiple_files = true;
option java_package = "com.github.iec.caller.grpc";
option java_outer_classname = "IecCallerProto";

service IecCaller {
  rpc Ping (Req) returns (Res);
  // еҸ‘йҖҒеёҰж—¶ж Үзҡ„жөӢиҜ•е‘Ҫд»Ө
  rpc SendTestCmd (SendTestCmdReq) returns (SendTestCmdRes);
  // еҸ‘иө·иҜ»е‘Ҫд»Ө
  rpc SendReadCmd (SendReadCmdReq) returns (SendReadCmdRes);
  // еҸ‘йҖҒжҖ»еҸ¬е”Ө
  rpc SendInterrogationCmd (SendInterrogationCmdReq) returns (SendInterrogationCmdRes);
  // зҙҜз§ҜйҮҸеҸ¬е”Ө
  rpc SendCounterInterrogationCmd(SendCounterInterrogationCmdReq) returns (SendCounterInterrogationCmdRes);
  // еҸ‘йҖҒе‘Ҫд»ӨпјҲйҖҡз”ЁпјҢйңҖжҢҮе®ҡtypeIdпјүжіЁж„Ҹ ж—  ack е“Қеә”
  rpc SendCommand(SendCommandReq) returns (SendCommandRes);
  // еҚ•зӮ№е‘Ҫд»Ө (C_SC_NA_1=45 дёҚеёҰж—¶ж Ү / C_SC_TA_1=58 еёҰCP56Time2aж—¶ж ҮпјҢз”ұwithTimeеӯ—ж®өжҺ§еҲ¶)
  rpc SendSingleCommand(SendSingleCommandReq) returns (SendSingleCommandRes);
  // еҸҢзӮ№е‘Ҫд»Ө (C_DC_NA_1=46 дёҚеёҰж—¶ж Ү / C_DC_TA_1=59 еёҰCP56Time2aж—¶ж ҮпјҢз”ұwithTimeеӯ—ж®өжҺ§еҲ¶)
  rpc SendDoubleCommand(SendDoubleCommandReq) returns (SendDoubleCommandRes);
  // жЎЈдҪҚи°ғиҠӮе‘Ҫд»Ө (C_RC_NA_1=47 дёҚеёҰж—¶ж Ү / C_RC_TA_1=60 еёҰCP56Time2aж—¶ж ҮпјҢз”ұwithTimeеӯ—ж®өжҺ§еҲ¶)
  rpc SendStepCommand(SendStepCommandReq) returns (SendStepCommandRes);
  // и®ҫзӮ№е‘Ҫд»Ө-еҪ’дёҖеҢ–еҖј (C_SE_NA_1=48 дёҚеёҰж—¶ж Ү / C_SE_TA_1=61 еёҰCP56Time2aж—¶ж ҮпјҢз”ұwithTimeеӯ—ж®өжҺ§еҲ¶)
  rpc SendSetpointNormalized(SendSetpointNormalizedReq) returns (SendSetpointNormalizedRes);
  // и®ҫзӮ№е‘Ҫд»Ө-ж ҮеәҰеҢ–еҖј (C_SE_NB_1=49 дёҚеёҰж—¶ж Ү / C_SE_TB_1=62 еёҰCP56Time2aж—¶ж ҮпјҢз”ұwithTimeеӯ—ж®өжҺ§еҲ¶)
  rpc SendSetpointScaled(SendSetpointScaledReq) returns (SendSetpointScaledRes);
  // и®ҫзӮ№е‘Ҫд»Ө-зҹӯжө®зӮ№ж•° (C_SE_NC_1=50 дёҚеёҰж—¶ж Ү / C_SE_TC_1=63 еёҰCP56Time2aж—¶ж ҮпјҢз”ұwithTimeеӯ—ж®өжҺ§еҲ¶)
  rpc SendSetpointFloat(SendSetpointFloatReq) returns (SendSetpointFloatRes);
  // 32дҪҚдҪҚдёІе‘Ҫд»Ө (C_BO_NA_1=51 дёҚеёҰж—¶ж Ү / C_BO_TA_1=64 еёҰCP56Time2aж—¶ж ҮпјҢз”ұwithTimeеӯ—ж®өжҺ§еҲ¶)
  rpc SendBitstringCommand(SendBitstringCommandReq) returns (SendBitstringCommandRes);

  // ж №жҚ®IDжҹҘиҜўзӮ№дҪҚз»‘е®ҡдҝЎжҒҜ
  rpc QueryPointMappingById(QueryPointMappingByIdReq) returns (QueryPointMappingByIdRes);
  // ж №жҚ®tagStationгҖҒcoaгҖҒioaжҹҘиҜўзӮ№дҪҚз»‘е®ҡдҝЎжҒҜ
  rpc QueryPointMappingByKey(QueryPointMappingByKeyReq) returns (QueryPointMappingByKeyRes);
  // еҲҶйЎөжҹҘиҜўзӮ№дҪҚз»‘е®ҡеҲ—иЎЁ
  rpc PageListPointMapping(PageListPointMappingReq) returns (PageListPointMappingRes);
  // жё…йҷӨзӮ№дҪҚз»‘е®ҡзј“еӯҳпјҲж”ҜжҢҒжү№йҮҸпјү
  rpc ClearPointMappingCache(ClearPointMappingCacheReq) returns (ClearPointMappingCacheRes);
}

message Req {
  string ping = 1;
}

message Res {
  string pong = 1;
}

message SendTestCmdReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
}

message SendTestCmdRes {
}

message SendReadCmdReq {
  string host = 1;
  int32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
}

message SendReadCmdRes {
}

message SendInterrogationCmdReq {
  string host = 1;
  int32 port = 2;
  uint32 coa = 3;
}

message SendInterrogationCmdRes {
}

message SendCounterInterrogationCmdReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
}

message SendCounterInterrogationCmdRes {
}

message SendCommandReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 typeId = 4; // жҢҮд»Өзұ»еһӢпјҢдҫӢеҰӮ 45=C_SC_NA_1, 46=C_DC_NA_1 ...
  uint32 ioa = 5;
  string value = 6; // йҖҡз”ЁеҖјпјҢдҫӢеҰӮ "1","true","12.3"
}

message SendCommandRes {
}

message SendSingleCommandRes {
  bool value = 1; // д»Һз«ҷеӣһжҳҫзҡ„еҚ•зӮ№е‘Ҫд»ӨеҖјпјҲtrue=еҗҲ, false=еҲҶпјү
}

message SendDoubleCommandRes {
  DoubleCommandValue value = 1; // д»Һз«ҷеӣһжҳҫзҡ„еҸҢзӮ№е‘Ҫд»ӨеҖјпјҲDCO_ON=еҗҲ, DCO_OFF=еҲҶпјү
}

message SendStepCommandRes {
  int32 value = 1; // д»Һз«ҷеӣһжҳҫзҡ„жЎЈдҪҚи°ғиҠӮе‘Ҫд»ӨеҖјпјҲ1=йҷҚдёҖжӯҘ, 2=еҚҮдёҖжӯҘпјү
}

message SendSetpointNormalizedRes {
  int32 value = 1; // д»Һз«ҷеӣһжҳҫзҡ„еҪ’дёҖеҢ–и®ҫзӮ№еҖјпјҲ-32768пҪһ32767пјҢеҜ№еә”-1.0пҪһ1.0пјү
}

message SendSetpointScaledRes {
  int32 value = 1; // д»Һз«ҷеӣһжҳҫзҡ„ж ҮеәҰеҢ–и®ҫзӮ№еҖјпјҲдёҺиҜ·жұӮзӣёеҗҢзҡ„еҺҹе§Ӣж ҮеәҰеҖјпјү
}

message SendSetpointFloatRes {
  double value = 1; // д»Һз«ҷеӣһжҳҫзҡ„зҹӯжө®зӮ№и®ҫзӮ№еҖјпјҲIEEE 754 еҚ•зІҫеәҰжө®зӮ№пјү
}

message SendBitstringCommandRes {
  uint64 value = 1; // д»Һз«ҷеӣһжҳҫзҡ„32дҪҚдҪҚдёІе‘Ҫд»ӨеҖјпјҲдҪҺ32дҪҚжңүж•Ҳпјү
}

message SendSingleCommandReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  bool value = 5;  // true=еҗҲ, false=еҲҶ
  bool withTime = 6; // true=еёҰCP56Time2aж—¶ж Ү(C_SC_TA_1=58), false=дёҚеёҰ(C_SC_NA_1=45)
}

message SendDoubleCommandReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  DoubleCommandValue value = 5;  // DCO_ON=еҗҲ, DCO_OFF=еҲҶ
  bool withTime = 6; // true=еёҰCP56Time2aж—¶ж Ү(C_DC_TA_1=59), false=дёҚеёҰ(C_DC_NA_1=46)
}

enum DoubleCommandValue {
  DCO_NOT_ALLOWED = 0;
  DCO_ON = 1;
  DCO_OFF = 2;
}

message SendStepCommandReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  StepCommandValue value = 5;  // SCO_DOWN=йҷҚдёҖжӯҘ, SCO_UP=еҚҮдёҖжӯҘ
  bool withTime = 6; // true=еёҰCP56Time2aж—¶ж Ү(C_RC_TA_1=60), false=дёҚеёҰ(C_RC_NA_1=47)
}

enum StepCommandValue {
  SCO_NOT_ALLOWED = 0;
  SCO_DOWN = 1;
  SCO_UP = 2;
}

message SendSetpointNormalizedReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  int32 value = 5;
  bool withTime = 6; // true=еёҰCP56Time2aж—¶ж Ү(C_SE_TA_1=61), false=дёҚеёҰ(C_SE_NA_1=48)
}

message SendSetpointScaledReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  int32 value = 5;
  bool withTime = 6; // true=еёҰCP56Time2aж—¶ж Ү(C_SE_TB_1=62), false=дёҚеёҰ(C_SE_NB_1=49)
}

message SendSetpointFloatReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  double value = 5;
  bool withTime = 6; // true=еёҰCP56Time2aж—¶ж Ү(C_SE_TC_1=63), false=дёҚеёҰ(C_SE_NC_1=50)
}

message SendBitstringCommandReq {
  string host = 1;
  uint32 port = 2;
  uint32 coa = 3;
  uint32 ioa = 4;
  uint64 value = 5;
  bool withTime = 6; // true=еёҰCP56Time2aж—¶ж Ү(C_BO_TA_1=64), false=дёҚеёҰ(C_BO_NA_1=51)
}

message PbDevicePointMapping {
  int64 id = 1;
  string createTime = 2;
  string updateTime = 3;
  string tagStation = 4;
  int64 coa = 5;
  int64 ioa = 6;
  string deviceId = 7;
  string deviceName = 8;
  string tdTableType = 9;
  int32 enablePush = 10; // 0: зҰҒз”ЁжҺЁйҖҒ, 1: еҗҜз”ЁжҺЁйҖҒ
  string ext1 = 11;
  string ext2 = 12;
  string ext3 = 13;
  string ext4 = 14;
  string ext5 = 15;
}

message QueryPointMappingByIdReq {
  int64 id = 1;
}

message QueryPointMappingByIdRes {
  PbDevicePointMapping mapping = 1;
}

message QueryPointMappingByKeyReq {
  string tagStation = 1;
  int64 coa = 2;
  int64 ioa = 3;
}

message QueryPointMappingByKeyRes {
  PbDevicePointMapping mapping = 1;
}

message PageListPointMappingReq {
  int64 page = 1; // йЎөз Ғ
  int64 pageSize = 2; // жҜҸйЎөеӨ§е°Ҹ
  string tagStation = 3;
  int64 coa = 4;
  string deviceId = 5;
}

message PageListPointMappingRes {
  int64 total = 1;
  repeated PbDevicePointMapping mappings = 2;
}

message ClearPointMappingCacheReq {
  repeated string keys = 1; // зј“еӯҳkeyеҲ—иЎЁ
  repeated CacheKeyInfo keyInfos = 2; // зј“еӯҳkeyдҝЎжҒҜеҲ—иЎЁпјҢз”ЁдәҺж №жҚ®tagStationгҖҒcoaгҖҒioaз”ҹжҲҗkey
}

message CacheKeyInfo {
  string tagStation = 1;
  int64 coa = 2;
  int64 ioa = 3;
}

message ClearPointMappingCacheRes {
  int64 clearedCount = 1; // жё…йҷӨзҡ„зј“еӯҳж•°йҮҸ
}