syntax = "proto3";

package bridgemqtt;
option go_package = "./bridgemqtt";
option java_multiple_files = true;
option java_package = "com.github.bridgemqtt.grpc";
option java_outer_classname = "BridgeMqttProto";

// Bridge MQTT 服务
service BridgeMqtt {
  // 发布消息
  rpc Publish(PublishReq) returns (PublishRes);
  // 带 traceId 的发布消息 内部服务链路追踪
  rpc PublishWithTrace(PublishWithTraceReq) returns (PublishWithTraceRes);
}

// -------------------- 通用请求/响应 --------------------
message PublishReq {
  string topic = 1;
  bytes payload = 2;
}

message PublishRes {
}

message PublishWithTraceReq {
  string topic = 1;
  bytes payload = 2;
}

message PublishWithTraceRes {
  string traceId = 1;
}
