  // 扩展字段1
  string ext1 = 52;
  // 扩展字段2
  string ext2 = 53;
  // 扩展字段3
  string ext3 = 54;
  // 扩展字段4
  string ext4 = 55;
  // 扩展字段5
  string ext5 = 56;
}


// 获取执行项仪表板统计信息请求
message GetExecItemDashboardReq {
  // 部门code，可选
  string deptCode = 1;
  // 用户ID，可选
  string userId = 2;
  // 计划类型，可选，为空时统计所有类型
  string planType = 3;
}

// 已结束执行项统计
message FinishedItemsStatsPb {
  // 已结束执行项总数
  int64 total = 1;
  // 其中终止执行项数
  int64 terminated = 2;
}

// 待完成执行项统计
message PendingItemsStatsPb {
  // 待完成执行项总数
  int64 total = 1;
  // 其中延期执行项数
  int64 delayed = 2;
}

// 执行项仪表板统计信息响应
message GetExecItemDashboardRes {
  // 统计结果列表
  repeated ExecItemDashboardItemPb stats = 1;
}

// 执行项仪表板统计项
message ExecItemDashboardItemPb {
  // 计划类型
  string planType = 1;
  // 当前执行项总数
  int64 total = 2;
  // 已结束执行项统计
  FinishedItemsStatsPb finished = 3;
  // 待完成执行项统计
  PendingItemsStatsPb pending = 4;
}

message CallbackPlanExecItemReq {
  // UUID主键ID
  string id = 1;
  // 执行ID 全局唯一
  string execId = 2;
  // 回调设计 参考 grpc status 用于分布式事务
  // 执行结果：completed-业务执行完成, terminated-业务终止, failed-业务执行失败, delayed-业务执行延期, ongoing-业务正在执行（未回调或部分异步）
  string execResult = 3 [(validate.rules).string = {in: ["completed", "terminated", "failed", "delayed", "ongoing"]}];
  // 结果描述  可以定义自己状态码，等下次回调判断业务场景
  string message = 4 [(validate.rules).string = {max_len: 1000}];
  // 结果原因 （成功/失败/延期原因，如“设备离线，延期至2024-01-01 09:00:00”）
  string reason = 5 [(validate.rules).string = {max_len: 1000}];
  // 延期配置-默认延期5分钟：delayed,ongoing-自定义延期
  DelayConfigPb delayConfig = 6;
}

message DelayConfigPb {
  // 下次触发时间（格式：yyyy-MM-dd HH:mm:ss，定时扫描的核心筛选条件）
  string nextTriggerTime = 1;
  // 延期原因
  string delayReason = 2 [(validate.rules).string = {max_len: 1000}];
}

message CallbackPlanExecItemRes {
}

message NextIdReq{
  // 输出描述类型 默认-P
  string outDescType = 1 [(validate.rules).string = {max_len: 64}];

  // true: 按维度/分类分开生成 ID
  // false: 全局统一生成 ID
  bool separate = 2;
}

message NextIdRes{
  string nextId = 1;
}

message BatchNextIdReq{
  // 输出描述类型 默认-P
  string outDescType = 1 [(validate.rules).string = {max_len: 64}];

  // true: 按维度/分类分开生成 ID
  // false: 全局统一生成 ID
  bool separate = 2;

  // 生成数量，自动扩位；用于业务批量插入前顺序预生成编码
  uint32 count = 3 [(validate.rules).uint32 = {gte: 1}];
}

message BatchNextIdRes{
  // 批量编码，按生成顺序返回
  repeated string nextIds = 1;
}

// ==================== Invoke Service ====================

// 单个调用任务描述
message InvokeTaskPb {
  // 任务唯一标识
  string id = 1 [(validate.rules).string = {min_len: 1}];
  // 协议类型: http / grpc
  string protocol = 2 [(validate.rules).string = {in: ["http", "grpc"]}];
  // 单任务超时时间（毫秒），0 表示不设单独超时
  int64 timeout = 3 [(validate.rules).int64 = {gte: 0}];

  // === HTTP 字段 ===
  // 请求地址
  string url = 10;
  // HTTP 方法: GET / POST / PUT / DELETE 等
  string httpMethod = 11;
  // 自定义请求头
  map<string, string> headers = 12;
  // 请求体（JSON 格式；当 Content-Type 为 application/x-www-form-urlencoded 或 multipart/form-data 时，会将 JSON 键值对转为对应表单编码）
  bytes body = 13;

  // === gRPC 字段 ===
  // gRPC 服务地址
  string grpcServer = 20;
  // gRPC 方法全路径，如 /pb.Service/Method
  string method = 21;
  // pb 字节数据
  bytes payload = 22;
}

// 并发调用请求
message InvokeReq {
  // 调用任务列表
  repeated InvokeTaskPb tasks = 1 [(validate.rules).repeated = {min_items: 1}];
  // 最大并发数，0 或不设表示不限制
  int32 maxConcurrency = 2 [(validate.rules).int32 = {gte: 0}];
  // 调试模式，开启后在日志中打印每个任务的响应数据
  bool debug = 3;
}

// 单个任务执行结果
message InvokeTaskResultPb {
  // 任务唯一标识，与请求中的 id 对应
  string id = 1;
  // 是否执行成功
  bool success = 2;
  // HTTP 状态码或 gRPC 状态码
  int32 statusCode = 3;
  // 错误信息（失败时）
  string error = 4;
  // 返回数据
  bytes data = 5;
  // 执行耗时（毫秒）
  int64 costMs = 6;
  // 格式化耗时，如 "123ms"、"1.5s"
  string costFormatted = 7;
}

// 并发调用响应
message InvokeRes {
  // 每个任务的独立执行结果
  repeated InvokeTaskResultPb results = 1;
}
