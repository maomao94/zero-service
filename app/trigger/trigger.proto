}

// DeleteCronJobReq 软删除指定 Cron Job。
message DeleteCronJobReq {
  // Trigger 生成的 JobId。
  string jobId = 1 [(validate.rules).string = {min_len: 1}];
}

// DeleteCronJobRes 表示删除操作已完成；任务原本不存在时也返回成功。
message DeleteCronJobRes {
}

