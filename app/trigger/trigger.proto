message CreatePlanTaskReq {
  // 机构code
  string deptCode = 101 [(validate.rules).string = {min_len: 1}];

  // 计划任务ID,全局唯一
  string planId = 1 [(validate.rules).string = {min_len: 1}];
  // 计划任务名称
  string planName = 2 [(validate.rules).string = {min_len: 1}];
  // 任务类型
  string type = 3 [(validate.rules).string = {min_len: 1}];
  // 计划组ID,用于分组管理计划任务
  string groupId = 4;
  // 描述
  string description = 5 [(validate.rules).string = {max_len: 200}];
  // 规则生效开始时间
  // 不传默认本年
  // 格式：yyyy-MM-dd HH:mm:ss
  string startTime = 6;
  // 规则生效结束时间
  // 不传默认本年
  // 格式：yyyy-MM-dd HH:mm:ss
  string endTime = 7;
  // 计划规则项 默认 规则项 MINUTELY
  PlanRulePb rule = 8 [(validate.rules).message = {required: true}];
  // 排除日期列表
  // 格式：yyyy-MM-dd
  repeated string excludeDates = 9 [(validate.rules).repeated = {items: {string: {min_len: 1}}}];
  // 间隔时间 单位: 毫秒
  int64 intervalTime = 10 [(validate.rules).int64 = {gte: 0}];
  // 间隔类型 0-不间隔（同时发起） 1-往后顺延 2-间隔时间内偏移
  int32 intervalType = 11 [(validate.rules).int32 = {gte: 0, lte: 2}];
  // 计划执行项-根据规则项生成日期批次-batchId 并生成对应批次执行项-execId
  repeated CreatePlanExecItemPb execItems = 12 [(validate.rules).repeated = {min_items: 1}];
  // batchNum 前缀
  string batchNumPrefix = 13;
  // 是否跳过时间过滤，用于立即执行的计划
  bool skipTimeFilter = 14;

  // 扩展字段
  string ext1 = 50;
  string ext2 = 51;
  string ext3 = 52;
  string ext4 = 53;
  string ext5 = 54;
}

message PlanRulePb {
  // 规则项 0-YEARLY 1-MONTHLY 2-WEEKLY 3-DAILY 4-HOURLY 5-MINUTELY
  int32 freq = 1 [(validate.rules).int32 = {gte: 0, lte: 5}];
  // 月（1-12）
  repeated int32 month = 2 [
    (validate.rules).repeated = {
      items: {int32: {gte: 1, lte: 12}}
    }
  ];
  // 月中的第几天（1-31 / -1 表示倒数第 1 天）
  repeated int32 day = 3 [
    (validate.rules).repeated = {
      items: {int32: {gte: -31, lte: 31, not_in: [0]}}
    }
  ];
  // 星期（1-7，1=周一，7=周日）
  repeated int32 week = 4 [
    (validate.rules).repeated = {
      items: {int32: {gte: 1, lte: 7}}
    }
  ];
  // 执行小时（0-23）
  repeated int32 hours = 5 [
    (validate.rules).repeated = {
      min_items: 1,
      items: {int32: {gte: 0, lte: 23}}
    }
  ];
  // 执行分钟（0-59）
  repeated int32 minutes = 6 [
    (validate.rules).repeated = {
      min_items: 1,
      items: {int32: {gte: 0, lte: 59}}
    }
  ];
}

// 计划执行项创建数据模型
message CreatePlanExecItemPb {
  // 执行项ID,业务字段,例如工单号
  string itemId = 1 [(validate.rules).string = {min_len: 1}];
  // 执行项类型,业务字段
  string itemType = 2;
  // 执行项名称,业务字段
  string itemName = 3;
  // 点位id,业务字段
  string pointId = 4;
  // 业务负载（必填）：序列化的业务专属参数（设备参数/转账金额/订单信息等）
  string payload = 5;
  // 请求超时时间 单位: 毫秒 可为空
  int64 requestTimeout = 6;

  // 扩展字段
  string ext1 = 50;
  string ext2 = 51;
  string ext3 = 52;
  string ext4 = 53;
  string ext5 = 54;
}

message CreatePlanTaskRes {
  // 计划主键ID
  string id = 1;
  // 计划ID
  string planId = 2;
  // 计划批次数
  int64 batchCnt = 3;
  // 执行计划数
  int64 execCnt = 4;
}

// CreateCronJobReq 是独立 RRULE 周期任务创建请求。
// Trigger 根据业务规则生成 RRuleStr、JobId 和首次 NextRun，不预拆分批次或执行项。
message CreateCronJobReq {
  // 全局唯一业务任务编码；与 Trigger 生成的 JobId 是两个不同标识。
  string taskCode = 1 [(validate.rules).string = {min_len: 1, max_len: 64}];
  // 任务名称。
  string taskName = 2 [(validate.rules).string = {min_len: 1, max_len: 128}];
  // 任务类型。
  string type = 3 [(validate.rules).string = {min_len: 1, max_len: 64}];
  // 任务分组 ID，用于业务侧分组管理。
  string groupId = 4 [(validate.rules).string = {max_len: 64}];
  // 任务描述。
  string description = 5 [(validate.rules).string = {max_len: 200}];
  // 规则生效开始时间；不传时默认当前年份第一天，格式 yyyy-MM-dd HH:mm:ss。
  string startTime = 6;
  // 规则生效结束时间；不传时默认开始时间所在年份最后一天，格式 yyyy-MM-dd HH:mm:ss。
  string endTime = 7;
  // 业务周期规则，由 Trigger 编译为 RFC 5545 RRULE。
  PlanRulePb rule = 8 [(validate.rules).message = {required: true}];
  // 排除日期列表，格式 yyyy-MM-dd；这些日期的计划时间不会触发。
  repeated string excludeDates = 9 [(validate.rules).repeated = {items: {string: {len: 10}}}];
  // 调度优先级，数字越大越优先。
  int32 priority = 10 [(validate.rules).int32 = {gte: 0}];
  // 执行业务参数 JSON；为空表示没有业务参数。
  string payload = 11;
  // 调用方业务扩展 JSON；Trigger 将其放入 CronJobExtra.bizExtra。
  string extra = 12;
  // 单次调度锁超时，单位毫秒；0 表示使用调度器默认值。
  int64 lockTimeout = 13 [(validate.rules).int64 = {gte: 0}];
  // 是否跳过首次未来时间过滤；为 true 时最多立即补触发一次，不追赶全部历史周期。
  bool skipTimeFilter = 14;

  // 扩展字段 1。
  string ext1 = 50;
  // 扩展字段 2。
  string ext2 = 51;
  // 扩展字段 3。
  string ext3 = 52;
  // 扩展字段 4。
  string ext4 = 53;
  // 扩展字段 5。
  string ext5 = 54;

  // 机构编码。
  string deptCode = 101 [(validate.rules).string = {min_len: 1, max_len: 64}];
}

// CreateCronJobRes 返回 Trigger 创建的周期任务标识和首次执行时间。
message CreateCronJobRes {
  // Trigger 生成的 JobId，对应 cron_job.id。
  string jobId = 1;
  // 首次计划执行时间，格式 yyyy-MM-dd HH:mm:ss；规则已耗尽时为空字符串。
  string nextRun = 2;
}

// EnableCronJobReq 启用指定 Cron Job。
message EnableCronJobReq {
  // Trigger 生成的 JobId。
  string jobId = 1 [(validate.rules).string = {min_len: 1}];
}

// EnableCronJobRes 表示启用操作已完成。
message EnableCronJobRes {
}

// DisableCronJobReq 禁用指定 Cron Job。
message DisableCronJobReq {
  // Trigger 生成的 JobId。
  string jobId = 1 [(validate.rules).string = {min_len: 1}];
}

// DisableCronJobRes 表示禁用操作已完成。
