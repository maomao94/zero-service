syntax = "proto3";

package trigger;
option go_package = "./trigger";

message Req {
  string ping = 1;
}

message Res {
  string pong = 1;
}

message SendTriggerReq {
  string msgId = 1; // 唯一消息 id
  string group = 2; // 分组，可为空
  string body = 3;
  int64 processIn = 4; // 秒
  string triggerTime = 5; // 触发时间 2019-01-01 00:00:00 二选一
  string url = 6; // POST json提交
}

message SendTriggerRes {
  // ID is the identifier of the task.
  string Id = 1;

  // Queue is the name of the queue in which the task belongs.
  string Queue = 2;

  // MaxRetry is the maximum number of times the task can be retried.
  int64 MaxRetry = 3;

  // Retried is the number of times the task has retried so far.
  int64 Retried = 4;

  // Group is the name of the group in which the task belongs.
  //
  // Tasks in the same queue can be grouped together by Group name and will be aggregated into one task
  // by a Server processing the queue.
  //
  // Empty string (default) indicates task does not belong to any groups, and no aggregation will be applied to the task.
  string Group = 5;
}

service TriggerRpc {
  rpc Ping (Req) returns (Res);
  rpc SendTrigger(SendTriggerReq) returns(SendTriggerRes);
}