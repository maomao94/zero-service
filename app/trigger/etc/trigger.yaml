Name: trigger.rpc
ListenOn: 0.0.0.0:21006
Mode: dev
Timeout: 120000
Log:
  Encoding: plain
  #  Mode: file
  Path: /opt/logs/trigger.rpc
  Level: info
  KeepDays: 300
NacosConfig:
  IsRegister: false
  Host: 127.0.0.1
  Port: 8848
  Username: nacos
  PassWord: nacos
  NamespaceId: public
  ServiceName: trigger
Redis:
  Host: 127.0.0.1:36379
  Type: node
  Key: trigger.rpc
  Pass: G62m50oigInC30sf
RedisDB: 0
# 数据库配置
DB:
  DataSource: root:PXDN93VRKUm8TeE7@tcp(localhost:33069)/zero?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai
  # DataSource: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable&TimeZone=Asia/Shanghai
  # 最大空闲连接数，默认 100。
  MaxIdleConns: 10
  # 最大打开连接数，默认 100。
  MaxOpenConns: 100
  # 慢 SQL 阈值，默认 200ms。
  SlowThreshold: 200ms
  # GORM 日志级别，默认 error，可选 silent/error/warn/info。
  LogLevel: info
  # 是否参数化 SQL 日志，默认 true。生产环境建议开启以避免日志暴露敏感参数。
  ParameterizedQueries: false
  # 是否忽略 record not found 日志，默认 false。
  IgnoreRecordNotFoundError: false
  # 是否按字段名显式查询，默认 false。
  QueryFields: false
StreamEventConf:
  # nacos://[user:passwd]@host/service?param=value'
  #  Target: nacos://nacos:nacos@127.0.0.1:8848/stream-event?namespaceid=public&timeout=5000s
  Endpoints:
    - 127.0.0.1:21009
  NonBlock: true
  Timeout: 120000
  GracePeriod: 30s
