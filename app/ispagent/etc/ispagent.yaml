Name: ispagent.rpc
ListenOn: 0.0.0.0:21014
Mode: dev
Log:
  Encoding: plain
  #  Mode: file
  Path: /opt/logs/ispagent
  Level: debug
  KeepDays: 300
# 数据库配置
DB:
#  DataSource: file:./data/ispagent-sqlite.db?cache=shared&parseTime=true&_loc=auto
  DataSource: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable&TimeZone=Asia/Shanghai
  # 最大空闲连接数，默认 10。
  MaxIdleConns: 10
  # 最大打开连接数，默认 100。
  MaxOpenConns: 100
  # 慢 SQL 阈值，默认 200ms。
  SlowThreshold: 200ms
  # GORM 日志级别，默认 error，可选 silent/error/warn/info。
  LogLevel: info
  # 是否参数化 SQL 日志，默认 false。生产环境建议开启以避免日志暴露敏感参数。
  ParameterizedQueries: false
  # 是否忽略 record not found 日志，默认 false。
  IgnoreRecordNotFoundError: false
  # 是否按字段名显式查询，默认 false。
  QueryFields: false
# 调度器配置
CronTask:
  Interval: 2s
  LockExpire: 30s
  # MaxDelay: 30m  # 停服太久导致的过期任务跳过执行，直接计算下次时间（默认30分钟）
# ISP TCP 客户端配置
IspSetting:
  ServerAddr: 10.10.1.213:7100         # 上级 ISP 系统地址
  SendCode: daystar-robot-code                   # 本端标识（固定配置）
  RegisterReceiveCode: Server01       # 注册报文中的预期对端标识（注册响应后以服务端实际返回为准）
  RootName: PatrolDevice              # XML 根元素（PatrolHost 或 PatrolDevice，与 Java 侧上级系统属性一致）
  HeartbeatInterval: 60s              # 默认心跳间隔（注册响应中的 heart_beat_interval 可覆盖）
  RequestTimeout: 10s                 # 单次请求超时
  ReconnectInterval: 3s               # 断线重连间隔
  MaxFrameLength: 1048576             # 单帧最大字节数
  DebugLog: true                       # 帧级 debug 日志（hex）
# 模型同步文件上传配置（示例占位，部署时通过环境配置覆盖）
ModelSync:
  FTPS:
    # Address 是 FTPS/FTP 服务地址，格式为 host:port；未配置时不会执行上传。
    Address: ""
    # Username 是登录 FTPS/FTP 服务的用户名；部署时通过环境或安全配置注入。
    Username: ""
    # Password 是登录 FTPS/FTP 服务的密码；不要在仓库配置里填写真实密码。
    Password: ""
    # RemoteDir 是模型文件上传到服务端的远程目录。
    RemoteDir: "/"
    # TLSMode 控制 TLS 握手方式：implicit 通常用于 990 端口，explicit 使用 AUTH TLS 升级。
    TLSMode: implicit                  # implicit 或 explicit
    # InsecureSkipVerify 为 true 时跳过服务端证书校验，仅用于测试或自签证书环境。
    InsecureSkipVerify: false
    # Timeout 是建立连接、登录和传输相关操作的超时时间。
    Timeout: 30s
    # DisableEPSV 为 true 时禁用 EPSV 被动模式，兼容不支持 EPSV 的 FTP 服务端或网络设备。
    DisableEPSV: true
    # UseTemporaryFile 为 true 时先上传为 .uploading 临时文件，成功后再重命名为目标文件。
    UseTemporaryFile: true
