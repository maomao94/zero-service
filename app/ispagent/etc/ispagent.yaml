Name: ispagent.rpc
ListenOn: 0.0.0.0:21014
Mode: dev
Log:
  Encoding: plain
  #  Mode: file
  Path: /opt/logs/ispagent
  Level: debug
  KeepDays: 300
# 数据库配置
DB:
  DataSource: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable&TimeZone=Asia/Shanghai
  # 最大空闲连接数，默认 10。
  MaxIdleConns: 10
  # 最大打开连接数，默认 100。
  MaxOpenConns: 100
  # 慢 SQL 阈值，默认 200ms。
  SlowThreshold: 200ms
  # GORM 日志级别，默认 error，可选 silent/error/warn/info。
  LogLevel: info
  # 是否参数化 SQL 日志，默认 false。生产环境建议开启以避免日志暴露敏感参数。
  ParameterizedQueries: false
  # 是否忽略 record not found 日志，默认 false。
  IgnoreRecordNotFoundError: false
  # 是否按字段名显式查询，默认 false。
  QueryFields: false
# 调度器配置
CronTask:
  Interval: 2s
  LockExpire: 30s
  # MaxDelay: 30m  # 停服太久导致的过期任务跳过执行，直接计算下次时间（默认30分钟）
# ISP TCP 客户端配置
IspSetting:
  ServerAddr: 10.10.1.213:7100         # 上级 ISP 系统地址
  SendCode: daystar-robot-code                   # 本端标识（固定配置）
  RegisterReceiveCode: Server01       # 注册报文中的预期对端标识（注册响应后以服务端实际返回为准）
  RootName: PatrolDevice              # XML 根元素（PatrolHost 或 PatrolDevice，与 Java 侧上级系统属性一致）
  HeartbeatInterval: 60s              # 默认心跳间隔（注册响应中的 heart_beat_interval 可覆盖）
  RequestTimeout: 10s                 # 单次请求超时
  ReconnectInterval: 3s               # 断线重连间隔
  MaxFrameLength: 1048576             # 单帧最大字节数
  DebugLog: true                       # 帧级 debug 日志（hex）
