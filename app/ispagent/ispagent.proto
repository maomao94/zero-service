syntax = "proto3";

package ispagent;

option go_package = "./ispagent";

// Item 对应 XML <Item attr="value"/> 的动态属性映射
message Item {
  map<string, string> attributes = 1;
}

// CommandReq 通用指令请求（ExecuteCommand 使用）
message CommandReq {
  int32 type = 1;              // 消息类型（高 16 位 messageId）
  int32 command = 2;           // 命令（低 16 位 messageId）
  string code = 3;             // 目标对象唯一标识（变电站编码/任务编码/巡视ID 等）
  repeated Item items = 4;     // 业务数据
}

// PatrolItemsReq 特定巡视上报请求（type/command 固定，仅填 code + items）
message PatrolItemsReq {
  string code = 1;             // 变电站编码
  repeated Item items = 2;     // 业务数据
}

// PatrolDeviceCoordinate 巡视装置坐标（表 O.45）
message PatrolDeviceCoordinate {
  string patrol_device_name = 1;   // 巡视装置名称
  string patrol_device_code = 2;   // 巡视装置编码
  string coordinate_pixel = 3;     // 格式 x,y,z,a（地图坐标 + 航向角）
  string coordinate_geography = 4; // 格式 x,y（经纬度）
  string task_patrolled_id = 5;    // 巡视任务执行ID，无巡视任务时可为空
}

// PatrolDeviceRunData 巡视装置运行数据（表 J.34）
message PatrolDeviceRunData {
  string patrol_device_name = 1;   // 巡视装置名称
  string patrol_device_code = 2;   // 巡视装置编码
  int32 type = 3;                  // 1=水平速度, 2=行驶里程, 3=电池电量, 4=垂直速度, 5=飞行距离, 6=飞行高度, 7=飞行时长, 8=云台俯仰角, 9=云台横滚角, 10=云台偏航角, 11=充电电流
  string value = 4;
  string value_unit = 5;
  string unit = 6;
}

// PatrolDeviceStatusData 巡视装置状态数据
message PatrolDeviceStatusData {
  string patrol_device_name = 1;   // 巡视装置名称
  string patrol_device_code = 2;   // 巡视装置编码
  string type = 3;                 // 状态类型编码
  string value = 4;
  string value_unit = 5;
  string unit = 6;
}

// SendPatrolDeviceCoordinatesReq 巡视装置坐标上报
message SendPatrolDeviceCoordinatesReq {
  string code = 1;                           // 目标对象唯一标识（可为空）
  repeated PatrolDeviceCoordinate items = 2;
}

// SendPatrolDeviceRunDataReq 巡视装置运行数据上报
message SendPatrolDeviceRunDataReq {
  string code = 1;                           // 目标对象唯一标识（可为空）
  repeated PatrolDeviceRunData items = 2;
}

// SendPatrolDeviceStatusDataReq 巡视装置状态数据上报
message SendPatrolDeviceStatusDataReq {
  string code = 1;                           // 目标对象唯一标识（可为空）
  repeated PatrolDeviceStatusData items = 2;
}

// CommandRes 指令响应（透传解析后的 SIP 回包）
message CommandRes {
  bool success = 1;            // type=251 时表示应答成功，其他类型默认 true
  string code = 2;             // 响应状态码（200/500/100/400）
  repeated Item items = 3;     // 解析后的 Item 列表
  string rawXml = 4;           // 原始 XML（诊断用）
}

// ListTaskExecutionsReq 查询任务未来执行时间
message ListTaskExecutionsReq {
  string task_code = 1;        // 任务编码
  int32 count = 2;             // 返回数量上限（默认 20）
}

// ListTaskExecutionsRes 任务未来执行时间响应
message ListTaskExecutionsRes {
  string task_code = 1;        // 任务编码
  string task_name = 2;
  string rrule_str = 3;        // 当前 rrule 字符串
  repeated string exec_times = 4; // 未来执行时间列表
}

// ListTaskConfigsReq 任务配置分页查询
message ListTaskConfigsReq {
  int32 page = 1;              // 页码（从 1 开始）
  int32 page_size = 2;         // 每页数量（默认 20）
  string task_code = 3;        // 任务编码（模糊匹配，可选）
  string substation_code = 4;  // 变电站编码（精确匹配，可选）
}

// TaskConfigItem 任务配置条目（平铺 ISP 业务字段）
message TaskConfigItem {
  int64 id = 1;
  string task_code = 2;
  string task_name = 3;
  string patrol_type = 4;          // 巡视类型: 1=例行,2=特殊,3=专项,4=自定义
  int32 priority = 5;              // 优先级 1-4
  int32 device_level = 6;          // 设备层级: 1=间隔,2=主设备,3=设备点位,4=部件
  string device_list = 7;          // 设备列表(逗号分隔)
  int32 status = 8;                // 0=禁用,1=启用
  string rrule_str = 9;
  string next_run = 10;            // 下次执行时间
  string last_run = 11;            // 上次执行时间
  string substation_code = 12;     // 变电站编码
  string isp_enable = 13;           // ISP 启用标记: 0=启用,1=禁用,2=删除
  string isp_creator = 14;          // 编制人
  string isp_create_time = 15;      // 编制时间
  string fixed_start_time = 16;    // 定期开始时间
  string cycle_month = 17;         // 周期(月)
  string cycle_week = 18;          // 周期(周)
  string cycle_execute_time = 19;  // 周期执行时间
  string cycle_start_time = 20;    // 周期开始时间
  string cycle_end_time = 21;      // 周期结束时间
  string interval_number = 22;     // 间隔数量
  string interval_type = 23;       // 间隔类型: 1=小时,2=天
  string interval_execute_time = 24; // 间隔执行时间
  string interval_start_time = 25; // 间隔开始时间
  string interval_end_time = 26;   // 间隔结束时间
  string invalid_start_time = 27;  // 不可用开始时间
  string invalid_end_time = 28;    // 不可用结束时间
}

// ListTaskConfigsRes 任务配置分页响应
message ListTaskConfigsRes {
  int64 total = 1;
  repeated TaskConfigItem items = 2;
}

// TestFTPSUploadReq FTPS 上传测试请求
message TestFTPSUploadReq {
  string local_path = 1;  // 测试文件本地路径，默认 local/test.txt
}

// TestFTPSUploadRes FTPS 上传测试响应
message TestFTPSUploadRes {
  bool success = 1;
  string remote_path = 2; // 上传成功后的远端路径
  string error = 3;       // 错误信息
}

// FTPSDirEntry FTPS 目录条目
message FTPSDirEntry {
  string name = 1;          // 文件/目录名
  bool is_dir = 2;          // 是否为目录
  uint64 size = 3;          // 文件大小（目录为 0）
  EntryType entry_type = 4; // 条目类型
  string size_display = 5;  // 格式化大小（如 "1.2 GB"、"345 KB"）
}

enum EntryType {
  ENTRY_TYPE_UNSPECIFIED = 0;
  ENTRY_TYPE_FILE = 1;
  ENTRY_TYPE_FOLDER = 2;
  ENTRY_TYPE_LINK = 3;
}

// ListFTPSDirectoryReq FTPS 目录列表请求
message ListFTPSDirectoryReq {
  string path = 1; // 子目录路径，空则列出根目录
}

// ListFTPSDirectoryRes FTPS 目录列表响应
message ListFTPSDirectoryRes {
  bool success = 1;
  repeated FTPSDirEntry entries = 2; // 目录下条目列表
  string error = 3;                  // 错误信息
}

// ReportIntervalEntry 上报间隔条目
message ReportIntervalEntry {
  int32 category = 1;         // 上报类别 messageId
  int64 interval_seconds = 2; // 当前间隔（秒）
  string name = 3;            // 中文名称，如 "巡视设备运行数据(2-0)"
}

// ReservedIntervalEntry 预留间隔条目
message ReservedIntervalEntry {
  string key = 1;             // 预留字段名，如 "nest_run_interval"
  int64 interval_seconds = 2; // 当前值（秒）
}

// ListReportIntervalsReq 上报间隔查询请求（空）
message ListReportIntervalsReq {}

// ListReportIntervalsRes 上报间隔查询响应
message ListReportIntervalsRes {
  repeated ReportIntervalEntry intervals = 1;       // 已激活上报类别间隔
  repeated ReservedIntervalEntry reserved = 2;      // 预留字段间隔
}

service IspAgent {
  // ExecuteCommand 通用指令透传（调用方指定 type/command）
  rpc ExecuteCommand(CommandReq) returns(CommandRes);
  // SendPatrolDeviceRunData 巡视装置运行数据上报（表 J.34）
  rpc SendPatrolDeviceRunData(SendPatrolDeviceRunDataReq) returns(CommandRes);
  // SendPatrolDeviceStatusData 巡视装置状态数据上报
  rpc SendPatrolDeviceStatusData(SendPatrolDeviceStatusDataReq) returns(CommandRes);
  // SendPatrolDeviceCoordinates 巡视装置坐标上报（表 O.45）
  rpc SendPatrolDeviceCoordinates(SendPatrolDeviceCoordinatesReq) returns(CommandRes);
  // ListTaskExecutions 查询任务未来执行时间（用于验证 rrule 配置）
  rpc ListTaskExecutions(ListTaskExecutionsReq) returns(ListTaskExecutionsRes);
  // ListTaskConfigs 任务配置分页查询
  rpc ListTaskConfigs(ListTaskConfigsReq) returns(ListTaskConfigsRes);
  // TestFTPSUpload 测试 FTPS 上传（上传 local/test.txt）
  rpc TestFTPSUpload(TestFTPSUploadReq) returns(TestFTPSUploadRes);
  // ListFTPSDirectory 列出 FTPS 远程目录文件列表
  rpc ListFTPSDirectory(ListFTPSDirectoryReq) returns(ListFTPSDirectoryRes);
  // ListReportIntervals 查询上报间隔配置
  rpc ListReportIntervals(ListReportIntervalsReq) returns(ListReportIntervalsRes);
}
