Name: mcpserver
Host: 0.0.0.0
Port: 13003
Mode: dev
Mcp:
  UseStreamable: false
  SseTimeout: 24h           # SSE 连接超时
#  MessageTimeout: 300s      # 工具执行超时，默认 30s，改为 5 分钟
  MessageTimeout: 18000s      # 工具执行超时，默认 30s，改为 30 分钟
Log:
  Encoding: plain
  #  Mode: file
  Path: /opt/logs/mcpserver
  Level: debug
  KeepDays: 300

Auth:
  JwtSecrets:
    - "629c6233-1a76-471b-bd25-b87208762219"
  ServiceToken: "mcp-internal-service-token-2026"
  # ClaimMapping: 外部 JWT claim key -> 内部标准 key（按需配置）
  ClaimMapping:
    user-id: "user_id"
    user-name: "user_name"
    dept-code: "dept_code"

BridgeModbusRpcConf:
  Endpoints:
    - 127.0.0.1:25004
  NonBlock: true
  Timeout: 10000

# Skills 配置 - 可选
Skills:
  Dir: "./skills"          # skills 目录路径
  AutoReload: true         # 是否热加载（修改 SKILL.md 后自动重载）
