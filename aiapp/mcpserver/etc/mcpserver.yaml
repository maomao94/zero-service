Name: mcpserver
Host: 0.0.0.0
Port: 13003
Mode: dev
Mcp:
  UseStreamable: true
Log:
  Encoding: plain
  #  Mode: file
  Path: /opt/logs/mcpserver
  Level: info
  KeepDays: 300

Auth:
  JwtSecrets:
    - "629c6233-1a76-471b-bd25-b87208762219"
  ServiceToken: "mcp-internal-service-token-2026"
  # ClaimMapping: 外部 JWT claim key -> 内部标准 key（按需配置）
  ClaimMapping:
    user-id: "user_id"
    user-name: "user_name"
    dept-code: "dept_code"

BridgeModbusRpcConf:
  Endpoints:
    - 127.0.0.1:25004
  NonBlock: true
  Timeout: 10000
