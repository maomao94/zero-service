Name: aigtw
Host: 0.0.0.0
Port: 13001
Timeout: 3000
Mode: dev
Log:
  Encoding: plain
  #  Mode: file
  Path: /opt/logs/aigtw
  Level: debug
  KeepDays: 300
JwtAuth:
  AccessSecret: "629c6233-1a76-471b-bd25-b87208762219"
  # ClaimMapping: 外部 JWT claim key -> 内部标准 key（按需配置）
  ClaimMapping:
    user-id: "user_id"
    user-name: "user_name"
    dept-code: "dept_code"
AiChatRpcConf:
  Endpoints:
    - 127.0.0.1:23001
  NonBlock: true
  Timeout: 120000
AiSoloRpcConf:
  Endpoints:
    - 127.0.0.1:23002
  NonBlock: true
  Timeout: 300000

# einox/rag 向量库（仅 aigtw HTTP /solo/v1/rag/*；JWT 用户隔离，与 aisolo 无共享配置要求）
Rag:
  Enabled: false
  Backend: sqlite
  DataDir: "./data/rag"
  Embedding:
    Provider: ark
    api_key: ""
    model: ""
    ark_region: cn-beijing
