<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - 对话测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-2: #232733;
            --border: #2e3344;
            --text: #e1e4ed;
            --text-secondary: #8b8fa7;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --green: #00cec9;
            --red: #ff6b6b;
            --user-bg: #2d2b55;
            --assistant-bg: #1e2130;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部栏 */
        .header {
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            display: flex; align-items: center; justify-content: center; font-size: 16px;
        }

        .header h1 { font-size: 16px; font-weight: 600; }
        .header .badge {
            font-size: 10px; padding: 2px 6px; border-radius: 4px;
            background: var(--surface-2); color: var(--text-secondary); font-weight: 500;
        }

        .header-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-controls select, .header-controls input {
            padding: 6px 10px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 12px;
            outline: none;
        }

        .header-controls select { cursor: pointer; min-width: 160px; }
        .header-controls input { width: 200px; }

        .header-controls .toggle-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .toggle { position: relative; width: 32px; height: 18px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .toggle .slider {
            position: absolute; inset: 0; background: var(--border);
            border-radius: 9px; cursor: pointer; transition: background 0.3s;
        }
        .toggle .slider::before {
            content: ''; position: absolute; width: 14px; height: 14px;
            left: 2px; bottom: 2px; background: white; border-radius: 50%; transition: transform 0.3s;
        }
        .toggle input:checked + .slider { background: var(--accent); }
        .toggle input:checked + .slider::before { transform: translateX(14px); }

        .stats-bar {
            display: flex; align-items: center; gap: 12px;
            font-size: 11px; color: var(--text-secondary);
        }
        .stats-bar .num { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

        /* 对话区域 */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .message {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px 24px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message .role {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .message.user .role { color: var(--accent-light); }
        .message.assistant .role { color: var(--green); }
        .message.system-msg .role { color: var(--text-secondary); }

        .message .content {
            font-size: 14px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .message.user { background: var(--user-bg); border-radius: 12px; margin-bottom: 4px; }
        .message.assistant { background: var(--assistant-bg); border-radius: 12px; margin-bottom: 4px; }
        .message.system-msg {
            background: transparent; font-size: 12px; text-align: center;
            color: var(--text-secondary); padding: 8px 24px;
        }

        .message .meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .cursor {
            display: inline-block; width: 2px; height: 1em;
            background: var(--accent); animation: blink 1s infinite; vertical-align: text-bottom;
        }

        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

        /* 输入区域 */
        .input-area {
            border-top: 1px solid var(--border);
            padding: 16px 24px;
            flex-shrink: 0;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            padding: 12px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            resize: none;
            min-height: 44px;
            max-height: 160px;
            line-height: 1.5;
            transition: border-color 0.2s;
        }

        .input-wrapper textarea:focus { border-color: var(--accent); }

        .input-wrapper textarea::placeholder { color: var(--text-secondary); }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            height: 44px;
            white-space: nowrap;
        }

        .btn-send { background: var(--accent); color: white; }
        .btn-send:hover { background: var(--accent-light); }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-stop { background: rgba(255,107,107,0.15); color: var(--red); border: 1px solid rgba(255,107,107,0.2); }
        .btn-stop:hover { background: rgba(255,107,107,0.25); }

        .btn-clear {
            background: var(--surface-2); color: var(--text-secondary);
            border: 1px solid var(--border); padding: 10px 14px;
        }
        .btn-clear:hover { color: var(--text); border-color: var(--text-secondary); }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
        .empty-state h2 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
        .empty-state p { font-size: 13px; }

        @media (max-width: 768px) {
            .header { flex-wrap: wrap; gap: 8px; }
            .header-controls { width: 100%; }
            .message { padding: 12px 16px; }
            .input-area { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-icon">&#x2728;</div>
    <h1>AI Chat</h1>
    <span class="badge">OpenAI Compatible</span>
    <div class="header-controls">
        <input type="text" id="baseUrl" value="http://localhost:11004" placeholder="Base URL">
        <select id="model"><option value="">加载中...</option></select>
        <div class="toggle-row">
            Stream
            <label class="toggle">
                <input type="checkbox" id="streamToggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div class="stats-bar">
            <span>Chunks <b class="num" id="chunkCount">0</b></span>
            <span>耗时 <b class="num" id="elapsed">-</b></span>
        </div>
    </div>
</div>

<div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
        <div class="icon">&#x1F4AC;</div>
        <h2>AI 对话测试</h2>
        <p>选择模型，输入消息开始对话</p>
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <textarea id="userInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
        <button class="btn btn-send" id="btnSend" onclick="sendMessage()">发送</button>
        <button class="btn btn-stop" id="btnStop" onclick="stopStream()" style="display:none">停止</button>
        <button class="btn btn-clear" onclick="clearChat()">清空</button>
    </div>
</div>

<script>
    let controller = null;
    let chunkCountVal = 0;
    let startTime = null;
    let elapsedTimer = null;
    let conversationHistory = [];

    window.addEventListener('load', () => loadModels());

    // 自动调整输入框高度
    const userInput = document.getElementById('userInput');
    userInput.addEventListener('input', () => {
        userInput.style.height = 'auto';
        userInput.style.height = Math.min(userInput.scrollHeight, 160) + 'px';
    });

    // Enter 发送，Shift+Enter 换行
    userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            if (!document.getElementById('btnSend').disabled) sendMessage();
        }
    });

    function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }

    function addChatMessage(role, content, meta) {
        const emptyState = document.getElementById('emptyState');
        if (emptyState) emptyState.remove();

        const area = document.getElementById('chatArea');
        const el = document.createElement('div');
        el.className = 'message ' + role;

        if (role === 'system-msg') {
            el.innerHTML = '<div class="content">' + escapeHtml(content) + '</div>';
        } else {
            const roleLabel = role === 'user' ? 'You' : 'Assistant';
            el.innerHTML = '<div class="role">' + roleLabel + '</div>' +
                '<div class="content" id="' + (el.id = 'msg-' + Date.now()) + '-content">' +
                escapeHtml(content) + '</div>' +
                (meta ? '<div class="meta">' + escapeHtml(meta) + '</div>' : '');
        }

        area.appendChild(el);
        area.scrollTop = area.scrollHeight;
        return el;
    }

    function startTimer() {
        startTime = Date.now();
        chunkCountVal = 0;
        document.getElementById('chunkCount').textContent = '0';
        elapsedTimer = setInterval(() => {
            const ms = Date.now() - startTime;
            const s = (ms / 1000).toFixed(1);
            document.getElementById('elapsed').textContent = s + 's';
        }, 100);
    }

    function stopTimer() {
        if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
    }

    async function loadModels() {
        const base = document.getElementById('baseUrl').value.replace(/\/$/, '');
        try {
            const resp = await fetch(base + '/aigtw/v1/models');
            const data = await resp.json();
            const select = document.getElementById('model');
            select.innerHTML = '';
            if (data.data && data.data.length > 0) {
                data.data.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    const meta = m.metadata;
                    opt.textContent = meta ? meta.display_name + ' (' + m.id + ')' : m.id;
                    select.appendChild(opt);
                });
            } else {
                select.innerHTML = '<option value="">无可用模型</option>';
            }
        } catch (err) {
            const select = document.getElementById('model');
            select.innerHTML = '<option value="">连接失败</option>';
        }
    }

    async function sendMessage() {
        const model = document.getElementById('model').value;
        const stream = document.getElementById('streamToggle').checked;
        const text = userInput.value.trim();

        if (!model) { alert('请先选择模型'); return; }
        if (!text) return;

        // 添加用户消息到历史
        conversationHistory.push({ role: 'user', content: text });
        addChatMessage('user', text);

        // 清空输入框
        userInput.value = '';
        userInput.style.height = 'auto';

        // UI 状态切换
        document.getElementById('btnSend').disabled = true;
        document.getElementById('btnSend').style.display = 'none';
        document.getElementById('btnStop').style.display = '';
        startTimer();

        const base = document.getElementById('baseUrl').value.replace(/\/$/, '');
        const body = {
            model: model,
            messages: conversationHistory.slice(),
            stream: stream
        };

        controller = new AbortController();

        // 预建助手消息占位
        const assistantEl = addChatMessage('assistant', '');
        const contentEl = assistantEl.querySelector('.content');

        try {
            const resp = await fetch(base + '/aigtw/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                signal: controller.signal
            });

            if (!resp.ok) {
                const errText = await resp.text();
                throw new Error('HTTP ' + resp.status + ': ' + errText);
            }

            if (stream) {
                const fullContent = await handleStream(resp, contentEl);
                conversationHistory.push({ role: 'assistant', content: fullContent });
                const ms = Date.now() - startTime;
                assistantEl.querySelector('.meta')?.remove();
                const metaDiv = document.createElement('div');
                metaDiv.className = 'meta';
                metaDiv.textContent = chunkCountVal + ' chunks | ' + (ms / 1000).toFixed(1) + 's';
                assistantEl.appendChild(metaDiv);
            } else {
                const data = await resp.json();
                const content = data.choices[0].message.content;
                contentEl.textContent = content;
                conversationHistory.push({ role: 'assistant', content: content });
                stopTimer();
                const ms = Date.now() - startTime;
                const metaDiv = document.createElement('div');
                metaDiv.className = 'meta';
                metaDiv.textContent = 'tokens: ' + data.usage.total_tokens + ' | ' + (ms / 1000).toFixed(1) + 's';
                assistantEl.appendChild(metaDiv);
            }
        } catch (err) {
            if (err.name === 'AbortError') {
                contentEl.textContent += '\n[已停止]';
            } else {
                contentEl.innerHTML = '<span style="color:var(--red)">' + escapeHtml(err.message) + '</span>';
            }
        } finally {
            cleanup();
        }
    }

    async function handleStream(resp, contentEl) {
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullContent = '';
        const area = document.getElementById('chatArea');

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;

                if (trimmed === 'data: [DONE]') {
                    stopTimer();
                    contentEl.innerHTML = escapeHtml(fullContent);
                    return fullContent;
                }

                if (trimmed.startsWith('data: ') || trimmed.startsWith('data:')) {
                    const jsonStr = trimmed.startsWith('data: ') ? trimmed.substring(6) : trimmed.substring(5);
                    try {
                        const chunk = JSON.parse(jsonStr);
                        const delta = chunk.choices[0]?.delta;

                        if (delta?.content) {
                            fullContent += delta.content;
                            contentEl.innerHTML = escapeHtml(fullContent) + '<span class="cursor"></span>';
                            area.scrollTop = area.scrollHeight;
                            chunkCountVal++;
                            document.getElementById('chunkCount').textContent = chunkCountVal;
                        }
                    } catch (e) {
                        // 忽略解析错误
                    }
                }
            }
        }

        stopTimer();
        contentEl.innerHTML = escapeHtml(fullContent);
        return fullContent;
    }

    function stopStream() {
        if (controller) {
            controller.abort();
        }
    }

    function cleanup() {
        controller = null;
        document.getElementById('btnSend').disabled = false;
        document.getElementById('btnSend').style.display = '';
        document.getElementById('btnStop').style.display = 'none';
        stopTimer();
        userInput.focus();
    }

    function clearChat() {
        conversationHistory = [];
        const area = document.getElementById('chatArea');
        area.innerHTML = '<div class="empty-state" id="emptyState">' +
            '<div class="icon">&#x1F4AC;</div>' +
            '<h2>AI 对话测试</h2>' +
            '<p>选择模型，输入消息开始对话</p></div>';
        chunkCountVal = 0;
        document.getElementById('chunkCount').textContent = '0';
        document.getElementById('elapsed').textContent = '-';
    }
</script>

</body>
</html>
