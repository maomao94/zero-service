            }).then(() => {
                hideModal();
                showToast('操作已取消');
            }).catch(error => {
                console.error('Reject error:', error);
                showToast('操作失败');
            });
        }

        // Close modal on overlay click
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'modalOverlay') {
                handleReject();
            }
        });

        // ========== Message Helpers ==========
        function addMessage(role, content) {
            const container = document.querySelector('.chat-container');
            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;

            const avatarText = role === 'user' ? '👤' : '🤖';
            messageEl.innerHTML = `
                <div class="message-avatar">${avatarText}</div>
                <div class="message-content">
                    <div class="message-bubble">${escapeHtml(content)}</div>
                    <div class="message-actions">
                        <button class="msg-action-btn" onclick="copyMessage(this)">📋</button>
                    </div>
                </div>
            `;

            container.appendChild(messageEl);
            scrollToBottom();
            return messageEl;
        }

        function addLoading() {
            const container = document.querySelector('.chat-container');
            const loadingEl = document.createElement('div');
            loadingEl.className = 'loading-message';
            loadingEl.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="loading-dots"><span></span><span></span><span></span></div>
            `;
            container.appendChild(loadingEl);
            scrollToBottom();
            return loadingEl;
        }

        function copyMessage(element) {
            const msgEl = element.closest('.message');
            const text = msgEl.querySelector('.message-bubble').textContent;
            navigator.clipboard.writeText(text).then(() => {
                showToast('已复制');
            }).catch(() => {
                showToast('复制失败');
            });
        }

        function saveSessionMessage(sessionId, role, content) {
            const sessions = JSON.parse(localStorage.getItem('aisolo_sessions') || '[]');
            const session = sessions.find(s => s.id === sessionId) || { id: sessionId, title: '', messages: [] };

            session.messages.push({ role, content, timestamp: Date.now() });

            if (!session.title && role === 'user') {
                session.title = content.length > 25 ? content.slice(0, 25) + '...' : content;
            }

            const otherSessions = sessions.filter(s => s.id !== sessionId);
            localStorage.setItem('aisolo_sessions', JSON.stringify([session, ...otherSessions]));
            loadSessions();
        }

        function loadSessionMessages(sessionId) {
            const sessions = JSON.parse(localStorage.getItem('aisolo_sessions') || '[]');
            const session = sessions.find(s => s.id === sessionId);

            const container = document.querySelector('.chat-container');
            container.innerHTML = '';

            if (session && session.messages.length > 0) {
                for (const msg of session.messages) {
                    addMessage(msg.role, msg.content);
                }
            } else {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg class="empty-illustration" viewBox="0 0 120 120" fill="none">
                            <circle cx="60" cy="60" r="50" fill="#dbeafe"/>
                            <circle cx="60" cy="45" r="18" fill="#3b82f6"/>
                            <path d="M35 85c0-13.8 11.2-25 25-25s25 11.2 25 25" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
                            <circle cx="52" cy="42" r="3" fill="white"/>
                            <circle cx="68" cy="42" r="3" fill="white"/>
                            <path d="M52 52c3 3 8 3 11 0" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <div class="empty-title">开始与 AI 对话</div>
                        <div class="empty-desc">选择上方智能体，输入消息开始对话。</div>
                    </div>
                `;
            }
            scrollToBottom();
        }

        // ========== Utilities ==========
        function generateSessionId() {
            return 'sess_' + 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function escHTML(s) {
            if (!s) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function scrollToBottom() {
            const chatArea = document.getElementById('chatArea');
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function renderMarkdown(text) {
            if (!text) return '';
            let html = text;

            // Code blocks
            html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
                `<pre><code>${escHTML(code)}</code></pre>`);

            // Inline code
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

            // Bold
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // Italic
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // Links
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

            // Headers
            html = html.replace(/^### (.*$)/gim, '<h3>$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2>$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1>$1</h1>');

            // Lists
            html = html.replace(/^\s*[-*+]\s+(.*)/gim, '<li>$1</li>');
            html = html.replace(/(<li>.*?<\/li>)/gis, '<ul>$1</ul>');
            html = html.replace(/^\s*\d+\.\s+(.*)/gim, '<li>$1</li>');

            // Tables
            html = html.replace(/^\|(.+)\|$/gim, m => '<tr><td>' + m.slice(1, -1).split('|').join('</td><td>') + '</td></tr>');
            html = html.replace(/(<tr>.*?<\/tr>)/gis, '<table>$1</table>');
            html = html.replace(/<tr><td>[-:| ]+<\/td><\/tr>/g, '');

            // Blockquote
            html = html.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');

            // Escape HTML (except our generated tags)
            html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Line breaks
            html = html.replace(/\n/g, '<br>');

            // Clean up
            html = html.replace(/<\/ul>\s*<ul>/g, '');

            return html;
        }
    </script>
