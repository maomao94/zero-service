<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP 异步工具调用测试</title>
    <style>
        :root {
            --bg: #ffffff;
            --surface: #f7f7f8;
            --surface-hover: #ececec;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --accent: #6c5ce7;
            --accent-hover: #5b4bd6;
            --success: #10a37f;
            --danger: #ef4444;
            --border: #e5e5ea;
            --code-bg: #f4f4f4;
        }
        [data-theme="dark"] {
            --bg: #1a1a1a;
            --surface: #2a2a2e;
            --surface-hover: #3a3a3e;
            --text-primary: #ececf1;
            --text-secondary: #a0a0b0;
            --accent: #6c5ce7;
            --accent-hover: #7d6ff0;
            --success: #10a37f;
            --danger: #ef4444;
            --border: #4e4f60;
            --code-bg: #2a2a2e;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { margin-bottom: 20px; font-size: 24px; }
        .card {
            background: var(--surface);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--text-primary);
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--accent);
        }
        textarea {
            font-family: 'Monaco', 'Menlo', monospace;
            resize: vertical;
            min-height: 120px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-secondary {
            background: var(--surface-hover);
            color: var(--text-primary);
            margin-left: 10px;
        }
        .btn-secondary:hover { opacity: 0.8; }
        .result {
            background: var(--code-bg);
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 400px;
            overflow-y: auto;
        }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-pending { background: #fef3cd; color: #856404; }
        .status-completed { background: #d4edda; color: #155724; }
        .status-failed { background: #f8d7da; color: #721c24; }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--success));
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
            font-weight: 500;
        }
        .error { color: var(--danger); }
        .success { color: var(--success); }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .theme-toggle {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            color: var(--text-primary);
        }
        .task-info {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .task-info span { display: flex; align-items: center; gap: 4px; }
        .step-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            font-weight: 600;
            font-size: 14px;
            margin-right: 10px;
        }
        .step-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        .step-header h3 { margin: 0; }
        .step-desc {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        .history-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            background: var(--code-bg);
            margin-bottom: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .history-item:hover { background: var(--surface-hover); }
        .history-info { flex: 1; }
        .history-tool { font-weight: 500; font-size: 13px; }
        .history-task { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
        .history-time { font-size: 11px; color: var(--text-secondary); }
        .history-empty { text-align: center; padding: 30px; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MCP 异步工具调用测试</h1>
            <button class="theme-toggle" onclick="toggleTheme()">切换主题</button>
        </div>

        <!-- 步骤1: 提交异步任务 -->
        <div class="card">
            <h3 style="margin-bottom: 16px;">1. 提交异步任务</h3>
            <div class="form-group">
                <label>服务器</label>
                <select id="server">
                    <option value="mcpserver">mcpserver</option>
                </select>
            </div>
            <div class="form-group">
                <label>工具名称</label>
                <input type="text" id="tool" value="test_progress" placeholder="如: test_progress">
            </div>
            <div class="form-group">
                <label>参数 (JSON)</label>
                <textarea id="args" placeholder='{"steps": 100, "interval": 100}'>{"steps": 100, "interval": 100}</textarea>
            </div>
            <div>
                <button class="btn btn-primary" id="submitBtn" onclick="submitTask()">提交任务</button>
                <button class="btn btn-secondary" onclick="clearResult()">清空</button>
            </div>
        </div>

        <!-- 步骤2: 任务状态显示 -->
        <div class="card" id="resultCard" style="display: none;">
            <h3 style="margin-bottom: 16px;">2. 任务状态</h3>
            <div>
                <!-- 状态徽章: pending=处理中, completed=已完成, failed=失败 -->
                <span class="status" id="statusBadge">-</span>
                <div class="task-info">
                    <span>Task ID: <code id="taskId">-</code></span>
                    <span>进度: <span id="progressText">0%</span></span>
                </div>
            </div>
            <!-- 进度条: 显示 0-100% 进度 -->
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
            </div>
            <!-- 结果展示区: 显示最终结果或错误信息 -->
            <div class="result" id="result"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // 配置
        // ============================================================

        /**
         * API 基础地址
         * 对应 go-zero aigtw 服务的监听地址
         */
        const API_BASE = 'http://localhost:13001/ai/v1';

        // ============================================================
        // JWT Token 管理
        // ============================================================

        /**
         * 从 localStorage 获取 JWT Token
         * Token 用于 API 认证，需要在请求头中携带
         * @returns {string} JWT Token 字符串
         */
        function getToken() {
            return localStorage.getItem('jwt_token') || '';
        }

        /**
         * 将 JWT Token 保存到 localStorage
         * @param {string} token - JWT Token 字符串
         */
        function setToken(token) {
            localStorage.setItem('jwt_token', token);
        }

        // ============================================================
        // 主题切换
        // ============================================================

        /**
         * 切换页面主题（亮色/暗色）
         * 主题状态保存在 HTML 元素的 data-theme 属性中
         */
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            html.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        // ============================================================
        // 任务提交
        // ============================================================

        /**
         * 提交异步工具调用任务
         *
         * 调用流程:
         * 1. 收集表单数据（服务器、工具名、参数）
         * 2. 验证参数 JSON 格式
         * 3. POST 请求提交到 /async/tool/call
         * 4. 获取 task_id 后启动轮询
         */
        async function submitTask() {
            // 获取表单数据
            const server = document.getElementById('server').value;
            const tool = document.getElementById('tool').value;
            const argsText = document.getElementById('args').value;

            // 验证工具名称必填
            if (!tool) {
                alert('请输入工具名称');
                return;
            }

            // 解析 JSON 参数，支持空参数 {}
            let args = {};
            try {
                args = JSON.parse(argsText || '{}');
            } catch (e) {
                alert('参数 JSON 格式错误');
                return;
            }

            // 禁用按钮，防止重复提交
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';

            try {
                // 发送 POST 请求到异步工具调用接口
                const response = await fetch(`${API_BASE}/async/tool/call`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({
                        server: server,
                        tool: tool,
                        args: args
                    })
                });

                const data = await response.json();
                console.log('提交结果:', data);

                // 请求成功且返回 task_id
                if (response.ok && data.task_id) {
                    // 显示结果卡片
                    document.getElementById('resultCard').style.display = 'block';
                    document.getElementById('taskId').textContent = data.task_id;
                    updateStatus('pending');
                    // 启动轮询获取结果
                    startPolling(data.task_id);
                } else {
                    // 显示错误信息
                    document.getElementById('result').textContent = '提交失败: ' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                // 网络错误或其他异常
                document.getElementById('result').textContent = '请求错误: ' + error.message;
            } finally {
                // 恢复按钮状态
                btn.disabled = false;
                btn.textContent = '提交任务';
            }
        }

        // ============================================================
        // 结果轮询
        // ============================================================

        /** 全局轮询定时器 ID，用于停止轮询 */
        let pollingInterval = null;

        /**
         * 启动轮询查询任务结果
         * @param {string} taskId - 任务 ID，从 submitTask 获取
         *
         * 轮询机制:
         * - 每 500ms 查询一次结果
         * - 状态为 completed 时停止轮询，显示结果
         * - 状态为 failed 时停止轮询，显示错误
         * - pending/running 状态继续轮询
         */
        async function startPolling(taskId) {
            // 先清除可能存在的旧轮询
            if (pollingInterval) clearInterval(pollingInterval);

            // 设置定时器，每 500ms 查询一次
            pollingInterval = setInterval(async () => {
                try {
                    // GET 请求查询任务结果
                    const response = await fetch(`${API_BASE}/async/tool/result/${taskId}`, {
                        headers: {
                            'Authorization': `Bearer ${getToken()}`
                        }
                    });

                    const data = await response.json();
                    console.log('查询结果:', data);

                    // 更新 UI 显示
                    updateStatus(data.status);
                    updateProgress(data.progress);

                    // 根据状态处理结果
                    if (data.status === 'completed') {
                        // 任务完成，停止轮询，显示结果
                        clearInterval(pollingInterval);
                        document.getElementById('result').textContent = data.result || '(无返回结果)';
                    } else if (data.status === 'failed') {
                        // 任务失败，停止轮询，显示错误
                        clearInterval(pollingInterval);
                        document.getElementById('result').textContent = '错误: ' + (data.error || '未知错误');
                    }
                    // pending/running 状态继续轮询，不做处理
                } catch (error) {
                    console.error('轮询错误:', error);
                }
            }, 500);
        }

        /**
         * 更新状态徽章显示
         * @param {string} status - 任务状态 (pending/running/completed/failed)
         */
        function updateStatus(status) {
            const badge = document.getElementById('statusBadge');
            badge.className = 'status status-' + status;
            badge.textContent = {
                'pending': '处理中',
                'running': '执行中',
                'completed': '已完成',
                'failed': '失败'
            }[status] || status;
        }

        /**
         * 更新进度条显示
         * @param {number} progress - 进度百分比 (0-100)
         */
        function updateProgress(progress) {
            const fill = document.getElementById('progressFill');
            const text = document.getElementById('progressText');
            const pct = Math.round(progress || 0);
            fill.style.width = pct + '%';
            fill.textContent = pct + '%';
            text.textContent = pct + '%';
        }

        /**
         * 清空结果，重置界面状态
         * 停止轮询，隐藏结果卡片，清空结果显示
         */
        function clearResult() {
            if (pollingInterval) clearInterval(pollingInterval);
            document.getElementById('resultCard').style.display = 'none';
            document.getElementById('result').textContent = '';
        }

        // ============================================================
        // 初始化
        // ============================================================

        /**
         * 页面初始化
         * 设置默认 JWT Token（示例 token）
         *
         * 注意: 生产环境应从登录流程获取真实 token
         * 示例 token 格式: {header}.{payload}.{signature}
         */
        if (!getToken()) {
            // 示例 JWT token（base64 编码的 payload）
            // Payload 示例: {"user_id":"user:2121","exp":1806024617}
            setToken('eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJkZXB0X2NvZGUiOiIxMDAwMSIsImRlcHRfaWQiOiIxMDAwMSIsImV4cCI6MTgwNjAyNDYxNywiaWF0IjoxNzc0NDg4NjE3LCJ1c2VyLWlkIjoidXNlcjoyMTIxIiwidXNlcl9pZCI6InVzZXJpZDFpMWpqazFuIiwidXNlcl9uYW1lIjoi5rWL6K-V55So5oi355uK5rW3In0.0l-eFx7sq8HMuAG_Amf_heCzs6LPUVlUzl4JSheCpGE');
        }
    </script>
</body>
</html>
