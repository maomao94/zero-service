<!DOCTYPE html>
<html lang="zh">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dtui-hello</title>
  <style>
    body { font-family: system-ui; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #1a1b26; color: #c0caf5; }
    .card { text-align: center; padding: 2rem; border-radius: 12px; background: #24283b; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    .tag { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; background: #7aa2f7; color: #1a1b26; font-size: 0.875rem; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>dtui-hello</h1>
    <p>Deployed via dtui</p>
    <span class="tag">v1.0.0</span>
  </div>
</body>
